<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Analytics Dashboard Test</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <style>
        .loading-spinner {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        .pulse {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: .5; }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="dashboard-root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Simple Analytics Dashboard Component
        function AnalyticsDashboard() {
            const [data, setData] = useState(null);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [responseTime, setResponseTime] = useState(0);
            const customerId = 'BB1042';

            const fetchData = async () => {
                setLoading(true);
                const startTime = performance.now();
                
                try {
                    const [balanceRes, analyticsRes, transactionsRes] = await Promise.all([
                        fetch('/api/customer/balance', {
                            headers: {
                                'X-Customer-ID': customerId,
                                'X-User-ID': customerId
                            }
                        }),
                        fetch('/api/customer/analytics', {
                            headers: {
                                'X-Customer-ID': customerId,
                                'X-User-ID': customerId
                            }
                        }),
                        fetch('/api/customer/transactions', {
                            headers: {
                                'X-Customer-ID': customerId,
                                'X-User-ID': customerId
                            }
                        })
                    ]);

                    const balance = await balanceRes.json();
                    const analytics = await analyticsRes.json();
                    const transactions = await transactionsRes.json();

                    setData({ balance, analytics, transactions });
                    setError(null);
                    
                    const endTime = performance.now();
                    setResponseTime(endTime - startTime);
                } catch (err) {
                    setError(err.message);
                    console.error('API Error:', err);
                }
                
                setLoading(false);
            };

            useEffect(() => {
                fetchData();
                
                // Auto-refresh every 30 seconds
                const interval = setInterval(fetchData, 30000);
                return () => clearInterval(interval);
            }, []);

            if (loading && !data) {
                return (
                    <div className="flex items-center justify-center min-h-screen">
                        <div className="text-center">
                            <div className="loading-spinner w-8 h-8 border-2 border-blue-500 border-t-transparent rounded-full mx-auto mb-4"></div>
                            <p className="text-gray-600">Loading dashboard...</p>
                        </div>
                    </div>
                );
            }

            if (error) {
                return (
                    <div className="flex items-center justify-center min-h-screen">
                        <div className="bg-red-50 border border-red-200 rounded-lg p-6 max-w-md">
                            <div className="flex items-center mb-4">
                                <span className="text-red-500 text-2xl mr-2">⚠️</span>
                                <h2 className="text-lg font-semibold text-red-800">Error Loading Dashboard</h2>
                            </div>
                            <p className="text-red-700 mb-4">{error}</p>
                            <button 
                                onClick={fetchData}
                                className="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700"
                            >
                                Try Again
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                    {/* Header */}
                    <div className="flex items-center justify-between mb-8">
                        <div>
                            <h1 className="text-3xl font-bold text-gray-900 mb-2">
                                Enhanced Analytics Dashboard
                                <span className="ml-3 text-lg">🚀</span>
                            </h1>
                            <p className="text-gray-600">
                                Real-time customer data for {customerId}
                            </p>
                        </div>
                        
                        <div className="flex items-center space-x-4">
                            <div className="bg-white rounded-lg px-4 py-2 shadow-sm border">
                                <div className="flex items-center space-x-2">
                                    <div className={`w-2 h-2 rounded-full ${
                                        responseTime < 100 ? 'bg-green-500 pulse' : 'bg-red-500'
                                    }`}></div>
                                    <span className="text-sm font-medium">
                                        API: {responseTime.toFixed(1)}ms
                                    </span>
                                </div>
                            </div>
                            
                            <button
                                onClick={fetchData}
                                disabled={loading}
                                className="flex items-center space-x-2 px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50"
                            >
                                <span className={loading ? 'loading-spinner' : ''}>🔄</span>
                                <span className="text-sm">{loading ? 'Refreshing...' : 'Refresh'}</span>
                            </button>
                        </div>
                    </div>

                    {/* KPI Cards */}
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                        {/* Balance Card */}
                        <div className="bg-white rounded-lg shadow-md p-6">
                            <h3 className="text-sm font-medium text-gray-500 mb-2">Current Balance</h3>
                            <p className="text-2xl font-bold text-gray-900">
                                ${data.balance.balance?.current?.toLocaleString() || '0'}
                            </p>
                            <p className="text-sm text-gray-600 mt-1">
                                {data.balance.balance?.currency || 'USD'}
                            </p>
                        </div>

                        {/* Weekly P&L Card */}
                        <div className="bg-white rounded-lg shadow-md p-6">
                            <h3 className="text-sm font-medium text-gray-500 mb-2">Weekly P&L</h3>
                            <p className={`text-2xl font-bold ${
                                (data.balance.balance?.weekly_pnl || 0) >= 0 ? 'text-green-600' : 'text-red-600'
                            }`}>
                                ${(data.balance.balance?.weekly_pnl || 0).toLocaleString()}
                            </p>
                            <p className="text-sm text-gray-600 mt-1">
                                {(data.balance.balance?.weekly_pnl || 0) >= 0 ? '↗️ Profit' : '↘️ Loss'}
                            </p>
                        </div>

                        {/* ROI Card */}
                        <div className="bg-white rounded-lg shadow-md p-6">
                            <h3 className="text-sm font-medium text-gray-500 mb-2">ROI</h3>
                            <p className={`text-2xl font-bold ${
                                (data.analytics.analytics?.performance_metrics?.roi_percentage || 0) >= 0 ? 'text-green-600' : 'text-red-600'
                            }`}>
                                {(data.analytics.analytics?.performance_metrics?.roi_percentage || 0).toFixed(2)}%
                            </p>
                            <p className="text-sm text-gray-600 mt-1">Return on Investment</p>
                        </div>

                        {/* Total Transactions Card */}
                        <div className="bg-white rounded-lg shadow-md p-6">
                            <h3 className="text-sm font-medium text-gray-500 mb-2">Total Transactions</h3>
                            <p className="text-2xl font-bold text-gray-900">
                                {data.analytics.analytics?.transaction_summary?.total || 0}
                            </p>
                            <p className="text-sm text-gray-600 mt-1">
                                {data.analytics.analytics?.transaction_summary?.completed || 0} completed
                            </p>
                        </div>
                    </div>

                    {/* Recent Transactions */}
                    <div className="bg-white rounded-lg shadow-md mb-8">
                        <div className="px-6 py-4 border-b border-gray-200">
                            <h3 className="text-lg font-medium text-gray-900">Recent Transactions</h3>
                        </div>
                        <div className="p-6">
                            {data.transactions.transactions?.length > 0 ? (
                                <div className="space-y-4">
                                    {data.transactions.transactions.slice(0, 5).map((tx) => (
                                        <div key={tx.id} className="flex items-center justify-between p-4 bg-gray-50 rounded-lg">
                                            <div className="flex items-center space-x-4">
                                                <div className={`w-10 h-10 rounded-lg flex items-center justify-center ${
                                                    tx.type === 'deposit' ? 'bg-green-100' : 
                                                    tx.type === 'withdrawal' ? 'bg-red-100' : 'bg-blue-100'
                                                }`}>
                                                    {tx.type === 'deposit' ? '📈' : tx.type === 'withdrawal' ? '📉' : '🔄'}
                                                </div>
                                                <div>
                                                    <p className="font-medium text-gray-900">{tx.description}</p>
                                                    <p className="text-sm text-gray-500">
                                                        {new Date(tx.timestamp).toLocaleString()}
                                                    </p>
                                                </div>
                                            </div>
                                            <div className="text-right">
                                                <p className={`font-bold ${
                                                    tx.amount >= 0 ? 'text-green-600' : 'text-red-600'
                                                }`}>
                                                    ${Math.abs(tx.amount).toLocaleString()}
                                                </p>
                                                <p className="text-sm text-gray-500 capitalize">{tx.status}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            ) : (
                                <p className="text-gray-500 text-center py-8">No transactions available</p>
                            )}
                        </div>
                    </div>

                    {/* Footer */}
                    <div className="text-center">
                        <p className="text-sm text-gray-500">
                            Enhanced Analytics Dashboard • Powered by Bun v1.2.21+ • 
                            Last updated: {new Date().toLocaleString()}
                        </p>
                    </div>
                </div>
            );
        }

        // Render the dashboard
        ReactDOM.render(<AnalyticsDashboard />, document.getElementById('dashboard-root'));
    </script>
</body>
</html>
