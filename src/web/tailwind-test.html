<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tailwind CSS Test</title>
    <link rel="stylesheet" href="./index.css">
</head>
<body>
    <div class="min-h-screen bg-gradient-to-br from-blue-50 to-white p-8">
        <div class="max-w-4xl mx-auto">
            <h1 class="text-4xl font-bold text-gray-900 mb-4">Tailwind CSS Test Page</h1>
            
            <div class="bg-white rounded-lg shadow-lg p-6 mb-6">
                <h2 class="text-2xl font-semibold text-gray-800 mb-3">Testing Utility Classes</h2>
                <p class="text-gray-600 mb-4">If you can see styled content below, Tailwind is working!</p>
                
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="bg-blue-500 text-white p-4 rounded-lg">
                        <div class="font-bold">Blue Box</div>
                        <div class="text-sm">bg-blue-500</div>
                    </div>
                    
                    <div class="bg-green-500 text-white p-4 rounded-lg">
                        <div class="font-bold">Green Box</div>
                        <div class="text-sm">bg-green-500</div>
                    </div>
                    
                    <div class="bg-purple-500 text-white p-4 rounded-lg">
                        <div class="font-bold">Purple Box</div>
                        <div class="text-sm">bg-purple-500</div>
                    </div>
                </div>
            </div>
            
            <div class="flex space-x-4">
                <button class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded transition-colors">
                    Primary Button
                </button>
                
                <button class="bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded transition-colors">
                    Secondary Button
                </button>
                
                <div class="flex items-center space-x-2">
                    <div class="w-3 h-3 bg-green-500 rounded-full animate-pulse"></div>
                    <span class="text-sm text-gray-600">Status: Active</span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
