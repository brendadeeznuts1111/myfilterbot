# FantDev Trading Branding & Design System Configuration
# Using Bun's native YAML support for better readability and maintainability

# Company Information
company:
  name: FantDev Trading
  tagline: Advanced Trading Intelligence Platform
  description: >
    Professional trading bot management and analytics platform 
    for serious traders
  founded: "2024"
  website: https://fantdev.com

# Color Palette
colors:
  # Primary brand colors
  primary: "#2563eb"        # Blue 600
  primary_dark: "#1d4ed8"   # Blue 700
  secondary: "#7c3aed"      # Purple 600
  accent: "#059669"         # Emerald 600
  
  # Status colors
  success: "#10b981"        # Emerald 500
  warning: "#f59e0b"        # Amber 500
  error: "#ef4444"          # Red 500
  info: "#3b82f6"           # Blue 500
  
  # Base colors
  background: "#f8fafc"     # Slate 50
  surface: "#ffffff"        # White
  text_primary: "#1f2937"   # Gray 800
  text_secondary: "#6b7280" # Gray 500
  border: "#e5e7eb"         # Gray 300

# Typography System
typography:
  # Font families
  font_primary: >
    -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 
    'Helvetica Neue', sans-serif
  font_mono: >
    'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', 
    Consolas, monospace
  
  # Font sizes
  sizes:
    xs: 0.75rem    # 12px
    sm: 0.875rem   # 14px
    base: 1rem     # 16px
    lg: 1.125rem   # 18px
    xl: 1.25rem    # 20px
    2xl: 1.5rem    # 24px
    3xl: 1.875rem  # 30px
    4xl: 2.25rem   # 36px

# Spacing Scale
spacing:
  xs: 0.25rem   # 4px
  sm: 0.5rem    # 8px
  md: 1rem      # 16px
  lg: 1.5rem    # 24px
  xl: 2rem      # 32px
  2xl: 3rem     # 48px

# Brand Assets & Themes
branding:
  logo_text: FantDev
  logo_icon: "📊"
  favicon: >
    data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' 
    viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>
  
  # Theme configurations
  theme_colors:
    light:
      background: "#ffffff"
      surface: "#f8fafc"
      text: "#1f2937"
    
    dark:
      background: "#1f2937"
      surface: "#374151"
      text: "#f9fafb"

# Navigation Structure
navigation:
  # Main navigation sections
  main_sections:
    - id: dashboard
      name: Dashboard
      icon: "📊"
      path: /
      roles: [admin, customer]
    
    - id: customers
      name: Customers
      icon: "👥"
      path: /customers
      roles: [admin]
    
    - id: transactions
      name: Transactions
      icon: "💰"
      path: /transactions
      roles: [admin, customer]
    
    - id: analytics
      name: Analytics
      icon: "📈"
      path: /analytics
      roles: [admin, customer]
    
    - id: groups
      name: Groups
      icon: "👥"
      path: /groups
      roles: [admin]
    
    - id: settings
      name: Settings
      icon: "⚙️"
      path: /settings
      roles: [admin, customer]
  
  # Footer navigation links
  footer_links:
    - name: Help & Support
      path: /help
    
    - name: Terms of Service
      path: /terms
    
    - name: Privacy Policy
      path: /privacy
    
    - name: API Documentation
      path: /docs

# Feature Flags
features:
  real_time_updates: true
  dark_mode: true
  mobile_responsive: true
  multi_language: false
  notifications: true
  export_data: true
  advanced_charts: true