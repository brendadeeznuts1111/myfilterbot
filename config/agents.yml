# Commission structure
commission:
  # Base rates
  base_rates:
    agent: 0.05         # 5% default
    master: 0.02        # 2% default
    master_override: 0.01  # 1% override on agent sales
  
  # Performance tiers
  performance_tiers:
    bronze:
      monthly_target: 10000
      agent_bonus: 0
      master_bonus: 0
      
    silver:
      monthly_target: 50000
      agent_bonus: 0.005  # +0.5%
      master_bonus: 0.002  # +0.2%
      
    gold:
      monthly_target: 100000
      agent_bonus: 0.01   # +1%
      master_bonus: 0.005  # +0.5%
      
    platinum:
      monthly_target: 250000
      agent_bonus: 0.015  # +1.5%
      master_bonus: 0.01   # +1%
  
  # Special bonuses
  bonuses:
    new_customer: 50      # $50 per new customer
    vip_customer: 500     # $500 per VIP customer
    retention_bonus: 0.01  # 1% for 90%+ retention
    volume_bonus:
      tier1: { min: 100000, bonus: 1000 }
      tier2: { min: 500000, bonus: 5000 }
      tier3: { min: 1000000, bonus: 15000 }
  
  # Payment schedule
  payment:
    frequency: monthly    # weekly, bi-weekly, monthly
    payment_day: 5       # 5th of each month
    min_payout: 100      # Minimum $100 for payout
    hold_period: 7       # 7 day hold for chargebacks
    
    # Payment methods
    methods:
      - bank_transfer
      - crypto
      - telegram_wallet
      - company_credit
  
  # Clawback rules
  clawback:
    enabled: true
    reasons:
      - customer_chargeback
      - fraudulent_activity
      - bonus_abuse
      - violation_of_terms
    grace_period: 30  # 30 days to dispute

# Hierarchy rules
hierarchy:
  # Promotion criteria
  promotion:
    agent_to_master:
      min_agents_recruited: 5
      min_monthly_volume: 500000
      min_tenure_months: 12
      min_customer_count: 100
      
  # Territory assignment
  territories:
    - id: T1
      name: "North America"
      masters: [M10]
      countries: [US, CA, MX]
      
    - id: T2
      name: "Europe"
      masters: [M11]
      countries: [GB, DE, FR, IT, ES]
      
    - id: T3
      name: "Asia Pacific"
      masters: [M12]
      countries: [CN, JP, KR, AU, NZ]
  
  # Reporting structure
  reporting:
    agent_reports_to: master
    master_reports_to: admin
    escalation_path:
      - agent
      - master
      - admin
      - owner

# KPIs and metrics
metrics:
  agent_kpis:
    - customer_acquisition
    - customer_retention
    - monthly_volume
    - average_customer_value
    - churn_rate
    
  master_kpis:
    - team_performance
    - agent_retention
    - territory_growth
    - total_network_volume
    
  tracking:
    - daily_signups
    - weekly_deposits
    - monthly_revenue
    - quarterly_growth
    - annual_profit