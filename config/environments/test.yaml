# Test Environment Configuration
# This file provides test-specific overrides for the main app.yaml

app:
  name: "Fantasy402 Trading Bot - Test"
  version: "2.1.0-test"
  environment: "test"
  timezone: "UTC"

# Test server configuration
server:
  bot:
    host: "localhost"
    port: 8081
    workers: 1
  
  admin:
    host: "localhost"
    port: 3001
    workers: 1
  
  api:
    host: "localhost"
    port: 3002
    rateLimit:
      windowMs: 60000
      maxRequests: 1000  # Higher limit for testing
  
  websocket:
    port: 3003
    compression: false  # Disable for testing
    maxConnections: 100

# Test database configuration
database:
  primary:
    type: "sqlite"
    database: ":memory:"  # In-memory database for testing
    pool:
      min: 1
      max: 5
      idleTimeout: 10000
  
  cache:
    type: "memory"  # In-memory cache for testing
    host: "localhost"
    port: 6379
    password: ""
    db: 1
    keyPrefix: "test:"
  
  analytics:
    type: "sqlite"
    database: ":memory:"

# Test security configuration
security:
  jwt:
    secret: "test-jwt-secret-key-for-testing-only"
    expiresIn: "1h"
    refreshExpiresIn: "24h"
  
  encryption:
    algorithm: "aes-256-gcm"
    key: "test-encryption-key-32-chars-long"
  
  cors:
    origins:
      - "http://localhost:3000"
      - "http://localhost:3001"
      - "http://localhost:3002"
    credentials: true
  
  rateLimit:
    enabled: false  # Disable for testing

# Test Telegram configuration
telegram:
  botToken: "test-bot-token-1234567890"
  webhookUrl: "http://localhost:3001/webhook"
  apiId: "12345"
  apiHash: "test-api-hash-32-chars-long"
  adminChatId: "123456789"

# Test cloud services
cloudflare:
  accountId: "test-account-id"
  apiToken: "test-api-token"
  workerName: "test-worker"
  kvNamespace: "test-namespace"

firebase:
  projectId: "test-project-id"

# Test feature flags
features:
  newDashboard:
    enabled: true
    rolloutPercentage: 100
    description: "Enhanced dashboard for testing"
  
  realTimeUpdates:
    enabled: true
    rolloutPercentage: 100
    description: "Real-time updates for testing"
  
  advancedAnalytics:
    enabled: false
    rolloutPercentage: 0
    description: "Advanced analytics (disabled in test)"

# Test agent configuration
agents:
  testAgent:
    id: "TEST001"
    name: "Test Agent"
    status: "active"
    commission_rate: 0.05
    customers: [1, 2, 3]
    telegram_id: 123456789
    balance: 1000.0
    total_earned: 500.0
    joined: "2024-01-01T00:00:00Z"
    code: "TEST"
    master: "TEST_MASTER"

# Test master configuration
masters:
  testMaster:
    id: "TEST_MASTER"
    name: "Test Master"
    status: "active"
    commission_rate: 0.02
    agents: ["TEST001"]
    telegram_id: 987654321
    balance: 5000.0
    total_earned: 1000.0
    joined: "2024-01-01T00:00:00Z"
    code: "TM"
