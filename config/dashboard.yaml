# Dashboard Configuration
dashboard:
  # Basic settings
  title: Fantdev Trading Bot Dashboard
  version: 3.0.0
  environment: ${NODE_ENV:-development}
  
  # Branding
  branding:
    name: Fantdev Trading Systems
    logo: 🤖
    tagline: Enterprise Trading Platform
    colors:
      primary: "#2a5298"
      secondary: "#1e3c72"
      success: "#28a745"
      warning: "#ffc107"
      danger: "#dc3545"
      info: "#17a2b8"
    fonts:
      heading: "-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
      body: "-apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif"
      monospace: "'SF Mono', Monaco, 'Cascadia Code', monospace"
  
  # Authentication
  auth:
    enabled: true
    sessionTimeout: 43200 # 12 hours in seconds
    requireMFA: false
    allowedDomains:
      - fantdev.com
      - fantasy402.com
    passwordPolicy:
      minLength: 8
      requireNumbers: true
      requireSpecialChars: true
  
  # UI Configuration
  ui:
    theme: auto # auto, light, dark
    sidebarCollapsed: false
    showNotifications: true
    animationsEnabled: true
    dateFormat: "YYYY-MM-DD"
    timeFormat: "HH:mm:ss"
    timezone: ${TZ:-UTC}
    language: en
    
    # Layout options
    layout:
      headerHeight: 60
      sidebarWidth: 260
      footerHeight: 40
      maxContentWidth: 1400
    
    # Navigation configuration
    navigation:
      collapsible: true
      persistState: true
      mobileBreakpoint: 768
      defaultExpanded:
        - reporting
        - tools
      items:
        - id: transactions
          label: Transactions
          icon: exchange-alt
          action: get-transactions
          order: 1
          
        - id: reporting
          label: Reporting
          icon: chart-bar
          order: 2
          subItems:
            - id: agent-performance
              label: Agent Performance
              icon: user-tie
              action: get-agent-performance
              roles: [admin, master_agent]
            - id: analysis
              label: Analysis
              icon: analytics
              action: get-analysis
            - id: ip-tracker
              label: IP Tracker
              icon: network-wired
              action: get-ip-tracker
              roles: [admin]
            - id: transaction-history
              label: Transaction History
              icon: history
              action: get-transaction-history
            - id: collections
              label: Collections
              icon: money-check-alt
              action: get-collections
            - id: deleted-wagers
              label: Deleted Wagers
              icon: trash-alt
              action: get-deleted-wagers
              roles: [admin, master_agent]
              
        - id: tools
          label: Tools
          icon: tools
          order: 3
          subItems:
            - id: bet-ticker
              label: Bet Ticker
              icon: scroll
              action: get-bet-ticker
              featureFlag: bettingTools
            - id: ticketwriter
              label: Ticketwriter
              icon: edit
              action: get-ticketwriter
              featureFlag: bettingTools
            - id: sportsbook-lines
              label: Sportsbook Lines
              icon: list-alt
              action: get-sportsbook-lines
              featureFlag: sportsbookIntegration
            - id: scores
              label: Scores
              icon: football-ball
              action: get-scores
              featureFlag: liveScores
              
        - id: add-players
          label: Add Players
          icon: user-plus
          action: add-account
          order: 4
          roles: [admin, master_agent, agent]
          
        - id: live-betting-limits
          label: Live Betting Limits
          icon: tachometer-alt
          action: get-live-betting-limits
          order: 5
          featureFlag: liveBetting
          
        - id: billing
          label: Billing
          icon: file-invoice-dollar
          action: get-billing
          order: 6
          badge: New
          badgeColor: red
          
        - id: rules
          label: Rules
          icon: gavel
          action: get-rules
          order: 7
          
        - id: contact
          label: Contact
          icon: address-card
          action: get-contact
          order: 8
          
        - id: divider-1
          divider: true
          order: 9
          
        - id: settings
          label: Settings
          icon: cog
          action: show-settings-modal
          order: 10
          
        - id: desktop-view
          label: Desktop View
          icon: desktop
          action: switch-to-desktop
          order: 11
          
        - id: mobile-view
          label: Mobile View
          icon: mobile-alt
          action: switch-to-mobile
          order: 12
          
        - id: divider-2
          divider: true
          order: 13
          
        - id: logout
          label: Logout
          icon: sign-out-alt
          href: /logout
          order: 14
    
    # Dashboard tabs
    tabs:
      - id: overview
        name: Overview
        icon: chart-line
        enabled: true
        default: true
      - id: services
        name: Services
        icon: server
        enabled: true
      - id: customers
        name: Customers
        icon: users
        enabled: true
      - id: telegram
        name: Telegram Operations
        icon: telegram
        enabled: true
        description: Telegram bot management, group monitoring, and message operations
        features:
          - bot_management
          - group_monitoring
          - message_operations
          - member_approval
          - cashier_operations
      - id: transactions
        name: Transactions
        icon: exchange-alt
        enabled: true
        description: Transaction monitoring, betting operations, and financial management
        features:
          - transaction_history
          - bet_management
          - fraud_detection
          - commission_tracking
      - id: agents
        name: Agents & Masters
        icon: user-tie
        enabled: true
        description: Agent hierarchy management and commission calculation
        features:
          - agent_management
          - master_management
          - commission_calculation
          - performance_tracking
      - id: api
        name: API Testing
        icon: code
        enabled: true
      - id: config
        name: YAML Config
        icon: cog
        enabled: true
      - id: features
        name: Feature Flags
        icon: toggle-on
        enabled: true
      - id: logs
        name: Live Logs
        icon: terminal
        enabled: true
      - id: analytics
        name: Analytics
        icon: chart-bar
        enabled: true
        description: Advanced analytics and reporting
        features:
          - performance_metrics
          - fraud_analytics
          - revenue_tracking
          - customer_insights
  
  # Metrics & Monitoring
  metrics:
    refreshInterval: 30000 # 30 seconds
    retentionDays: 30
    enabledMetrics:
      # Core System Metrics
      - activeUsers
      - totalTransactions
      - totalBalance
      - systemUptime
      - serviceHealth
      - apiLatency
      - errorRate
      
      # Telegram Specific Metrics
      - telegramBotStatus
      - telegramGroupMembers
      - telegramMessagesPerHour
      - telegramCommandsExecuted
      - pendingMemberApprovals
      - cashierBotTransactions
      - groupMonitoringAlerts
      - telegramApiLatency
      
      # Financial Metrics
      - hourlyTransactionVolume
      - depositSuccessRate
      - withdrawalPendingCount
      - fraudDetectionAlerts
      - commissionCalculations
      - agentPerformance
      - customerBalanceChanges
      
      # Service Performance
      - databaseConnections
      - redisHitRate
      - websocketConnections
      - apiRequestsPerMinute
      - backgroundJobsQueued
      - logErrorsPerHour
    
    # Alert thresholds
    alerts:
      errorRateThreshold: 5 # percent
      latencyThreshold: 1000 # ms
      uptimeThreshold: 99.9 # percent
      balanceChangeThreshold: 10000 # dollars
  
  # API Configuration
  api:
    baseUrl: ${API_BASE_URL:-/api}
    timeout: 30000 # 30 seconds
    retryAttempts: 3
    retryDelay: 1000 # 1 second
    
    # Rate limiting
    rateLimit:
      enabled: true
      windowMs: 60000 # 1 minute
      maxRequests: 100
    
    # CORS settings
    cors:
      enabled: true
      origins:
        - http://localhost:3003
        - https://fantdev.com
        - https://dashboard.fantdev.com
      credentials: true
  
  # WebSocket Configuration
  websocket:
    enabled: true
    reconnect: true
    reconnectDelay: 5000 # 5 seconds
    maxReconnectAttempts: 10
    heartbeatInterval: 30000 # 30 seconds
    
    # Channels to subscribe
    channels:
      # Configuration Channels
      - config:changed
      - feature:toggled
      - hotreload:triggered
      
      # Customer & Data Channels  
      - customer:updated
      - customer:created
      - customer:balance:changed
      
      # Service Status Channels
      - service:status
      - service:health:changed
      - database:connection:status
      - redis:connection:status
      
      # Telegram Operation Channels
      - telegram:bot:status
      - telegram:bot:command:received
      - telegram:group:member:joined
      - telegram:group:member:left
      - telegram:group:message:received
      - telegram:cashier:transaction:pending
      - telegram:cashier:transaction:completed
      - telegram:member:approval:pending
      - telegram:member:approved
      - telegram:member:denied
      
      # Transaction & Financial Channels
      - transaction:created
      - transaction:completed
      - transaction:failed
      - deposit:received
      - withdrawal:requested
      - bet:placed
      - bet:settled
      - fraud:alert:triggered
      - commission:calculated
      
      # System Monitoring Channels
      - system:alert
      - system:error
      - system:performance:warning
      - log:error:critical
      - api:rate:limit:exceeded
  
  # Logging
  logging:
    level: ${LOG_LEVEL:-info} # debug, info, warn, error
    maxLines: 500
    persistLogs: true
    logFile: ./logs/dashboard.log
    
    # Log filters
    filters:
      - level: error
        highlight: true
        notify: true
      - level: warn
        highlight: true
        notify: false
  
  # Export Options
  export:
    formats:
      - json
      - csv
      - excel
      - pdf
    includeMetadata: true
    compressFiles: true
    emailEnabled: false
  
  # Feature Toggles (Dashboard-specific)
  features:
    customerManagement:
      enabled: true
      allowCreate: true
      allowEdit: true
      allowDelete: false
    
    yamlEditor:
      enabled: true
      syntaxHighlighting: true
      autoSave: false
      validation: true
    
    apiTesting:
      enabled: true
      saveHistory: true
      maxHistoryItems: 50
    
    realTimeUpdates:
      enabled: true
      useWebSocket: true
      useSSE: true
    
    advancedAnalytics:
      enabled: false
      chartLibrary: recharts
      exportCharts: true
  
  # Service Endpoints
  services:
    # Core Services
    telegram_bot:
      name: Telegram Main Bot
      endpoint: /api/bot/status
      healthCheck: true
      icon: telegram
      description: Primary trading bot for customer interactions
      operations:
        - send_message: /api/admin/telegram/send
        - get_messages: /api/admin/telegram/messages  
        - get_chats: /api/admin/telegram/chats
        - bot_status: /api/admin/telegram/bot/status
    
    telegram_cashier:
      name: Telegram Cashier Bot
      endpoint: /api/admin/telegram/cashier/status
      healthCheck: true
      icon: credit-card
      description: Payment processing bot
      operations:
        - payment_status: /api/admin/telegram/cashier/status
        - process_deposit: /api/admin/deposits
        - process_withdrawal: /api/admin/transactions
    
    telegram_groups:
      name: Telegram Group Management
      endpoint: /api/admin/telegram/groups
      healthCheck: true
      icon: users
      description: Trading group monitoring and management
      operations:
        - list_groups: /api/admin/telegram/groups
        - group_messages: /api/admin/telegram/group/{group_id}
        - member_management: /api/admin/members
        - approve_member: /api/admin/members/{id}/approve
        - deny_member: /api/admin/members/{id}/deny
    
    portal:
      name: Portal Server
      endpoint: /api/health
      healthCheck: true
      icon: globe
      description: Customer portal and web interface
      operations:
        - customer_portal: /api/remote/customers
        - p2p_deposits: /api/remote/p2p/deposits
        - p2p_withdrawals: /api/remote/p2p/withdrawals
    
    admin:
      name: Admin Server
      endpoint: /api/health
      healthCheck: true
      icon: user-shield
      description: Administrative interface and API
      operations:
        - admin_stats: /api/admin/stats
        - system_health: /api/admin/health
        - export_data: /api/admin/export/customers
        - sync_balances: /api/admin/sync-balances
    
    websocket:
      name: WebSocket Server
      endpoint: /api/ws/status
      healthCheck: true
      icon: plug
      description: Real-time communication service
      operations:
        - live_stream: /api/dashboard/stream
        - real_time_updates: /api/ws
    
    database:
      name: Database Service
      endpoint: /api/db/status
      healthCheck: true
      icon: database
      description: PostgreSQL database connection
      operations:
        - health_check: /api/admin/health/db
        - data_reload: /api/admin/data/reload
        - customer_data: /api/admin/customers
    
    redis:
      name: Redis Cache
      endpoint: /api/redis/status
      healthCheck: true
      icon: bolt
      description: In-memory caching and session storage
      operations:
        - cache_health: /api/admin/health/redis
        - session_management: /api/auth/login
        - rate_limiting: built-in
    
    # Additional Services
    fraud_detection:
      name: Fraud Detection
      endpoint: /api/admin/fraud/scores
      healthCheck: false
      icon: shield-alt
      description: Real-time fraud monitoring and scoring
      operations:
        - fraud_scores: /api/admin/fraud/scores
        - flag_customer: /api/admin/fraud/flag/{customer_id}
        - fraud_logs: /api/admin/fraud/logs
    
    transaction_engine:
      name: Transaction Engine
      endpoint: /api/admin/transactions
      healthCheck: false
      icon: exchange-alt
      description: Transaction processing and management
      operations:
        - list_transactions: /api/admin/transactions
        - create_transaction: /api/admin/transactions
        - transaction_summary: /api/admin/transactions/summary
        - bets: /api/admin/bets
        - settle_bet: /api/admin/bets/{bet_id}/settle
        - bet_stats: /api/admin/bets/stats
    
    agent_management:
      name: Agent Management
      endpoint: /api/admin/agents
      healthCheck: false
      icon: user-tie
      description: Agent and master agent management
      operations:
        - list_agents: /api/admin/agents
        - agent_details: /api/admin/agents/{agent_id}
        - list_masters: /api/admin/masters
        - master_details: /api/admin/masters/{master_id}
        - commissions: /api/admin/commissions
        - calculate_commissions: /api/admin/commissions/calculate
    
    logging_service:
      name: Logging Service
      endpoint: /api/admin/logs
      healthCheck: false
      icon: file-alt
      description: System logging and monitoring
      operations:
        - system_logs: /api/admin/logs
        - web_logs: /api/admin/logs/web
        - service_logs: /api/admin/logs/service/{service_name}
    
    remote_dashboard:
      name: Remote Dashboard
      endpoint: /api/remote/stats
      healthCheck: false
      icon: chart-line
      description: Remote dashboard integration (fire22.ag)
      operations:
        - remote_customers: /api/remote/customers
        - remote_transactions: /api/remote/transactions
        - remote_telegram: /api/remote/telegram/groups
        - remote_messages: /api/remote/telegram/messages
  
  # Quick Actions
  quickActions:
    # System Control
    - id: start-all
      name: Start All Services
      icon: play
      action: /api/services/start
      method: POST
      confirmRequired: true
      category: system
    
    - id: stop-all
      name: Stop All Services
      icon: stop
      action: /api/services/stop
      method: POST
      confirmRequired: true
      category: system
    
    - id: restart-services
      name: Restart Services
      icon: sync
      action: /api/services/restart
      method: POST
      confirmRequired: true
      category: system
    
    - id: health-check
      name: Full Health Check
      icon: heartbeat
      action: /api/health/full
      method: GET
      confirmRequired: false
      category: system
    
    # Data Management
    - id: export-data
      name: Export All Data
      icon: download
      action: /api/export/all
      method: GET
      confirmRequired: false
      category: data
    
    - id: sync-balances
      name: Sync Customer Balances
      icon: refresh
      action: /api/admin/sync-balances
      method: POST
      confirmRequired: true
      category: data
      
    - id: reload-data
      name: Reload Database
      icon: database
      action: /api/admin/data/reload
      method: POST
      confirmRequired: false
      category: data
    
    # Telegram Operations
    - id: telegram-status
      name: Check Bot Status
      icon: telegram
      action: /api/admin/telegram/bot/status
      method: GET
      confirmRequired: false
      category: telegram
      
    - id: telegram-groups
      name: List Active Groups
      icon: users
      action: /api/admin/telegram/groups
      method: GET
      confirmRequired: false
      category: telegram
      
    - id: approve-pending
      name: View Pending Members
      icon: user-check
      action: /api/admin/members?status=pending
      method: GET
      confirmRequired: false
      category: telegram
      
    - id: telegram-messages
      name: Recent Messages
      icon: message-circle
      action: /api/admin/telegram/messages?limit=50
      method: GET
      confirmRequired: false
      category: telegram
    
    # Financial Operations
    - id: transaction-summary
      name: Transaction Summary
      icon: bar-chart
      action: /api/admin/transactions/summary
      method: GET
      confirmRequired: false
      category: financial
      
    - id: fraud-check
      name: Check Fraud Scores
      icon: shield
      action: /api/admin/fraud/scores
      method: GET
      confirmRequired: false
      category: financial
      
    - id: calculate-commissions
      name: Calculate Commissions
      icon: calculator
      action: /api/admin/commissions/calculate
      method: POST
      confirmRequired: true
      category: financial
    
    # System Monitoring
    - id: view-logs
      name: Recent System Logs
      icon: file-text
      action: /api/admin/logs/web?tail=100
      method: GET
      confirmRequired: false
      category: monitoring
      
    - id: system-metrics
      name: Performance Metrics
      icon: activity
      action: /api/admin/metrics
      method: GET
      confirmRequired: false
      category: monitoring
  
  # Permissions
  permissions:
    admin:
      - "*" # All permissions
    
    manager:
      - dashboard.view
      - customers.view
      - customers.edit
      - config.view
      - logs.view
      - api.test
    
    viewer:
      - dashboard.view
      - customers.view
      - logs.view
    
    developer:
      - dashboard.view
      - config.view
      - config.edit
      - api.test
      - logs.view
      - features.toggle
  
  # Integrations
  integrations:
    fantasy402:
      enabled: true
      baseUrl: https://fantasy402.com
      syncInterval: 300000 # 5 minutes
      endpoints:
        - /api/get-agent-billing
        - /app/api/billing
        - /manager/api/balance
    
    telegram:
      enabled: true
      botToken: ${TELEGRAM_BOT_TOKEN}
      webhookUrl: ${TELEGRAM_WEBHOOK_URL}
    
    slack:
      enabled: false
      webhookUrl: ${SLACK_WEBHOOK_URL}
      channel: "#trading-alerts"
    
    discord:
      enabled: false
      webhookUrl: ${DISCORD_WEBHOOK_URL}
  
  # Security
  security:
    csrf:
      enabled: true
      tokenName: _csrf
    
    headers:
      frameOptions: DENY
      contentTypeOptions: nosniff
      xssProtection: true
      strictTransportSecurity: true
    
    encryption:
      algorithm: aes-256-gcm
      key: ${ENCRYPTION_KEY}
  
  # Development
  development:
    debugMode: ${DEBUG:-false}
    verboseLogging: true
    mockData: false
    hotReload: true
    sourceMaps: true
    
    # Development overrides
    overrides:
      auth:
        enabled: false
      rateLimit:
        enabled: false
      cors:
        origins:
          - "*"