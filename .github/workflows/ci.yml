name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_ENV: test
  PYTHON_VERSION: '3.11'
  BUN_VERSION: 'latest'

jobs:
  test-python:
    name: Python Tests (Optional)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # Don't block CI on Python test failures
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('config/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install minimal dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-dotenv pytest || echo "⚠️ Python deps install failed, continuing..."
    
    - name: Create test environment file
      run: |
        # Create minimal .env for testing
        echo "BOT_TOKEN=test_token" > .env
        echo "ADMIN_CHAT_ID=123456789" >> .env
        echo "NODE_ENV=test" >> .env
        echo "DATABASE_PATH=./test_data" >> .env
    
    - name: Run Python tests (if available)
      run: |
        if [ -d "tests/python" ] && [ "$(find tests/python -name '*.py' | wc -l)" -gt 0 ]; then
          python -m pytest tests/python/ -v --maxfail=5 || echo "⚠️ Python tests failed, continuing..."
        else
          echo "⚠️ No Python tests found, skipping..."
        fi

  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    timeout-minutes: 8
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ env.BUN_VERSION }}

    - name: Cache Bun dependencies
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-
    
    - name: Install dependencies
      run: bun install --frozen-lockfile
    
    - name: Verify TypeScript configuration (Fast)
      run: |
        bunx --package typescript tsc --noEmit --skipLibCheck
    
    - name: Run TypeScript tests (Fast Mode)
      run: |
        # Skip pre-commit hooks and run tests in parallel
        SKIP_HUSKY=1 bun test --coverage --timeout=30000
    
    - name: Upload TypeScript coverage
      uses: codecov/codecov-action@v4
      if: success()
      with:
        directory: ./coverage
        flags: typescript
        name: typescript-coverage

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ env.BUN_VERSION }}

    - name: Cache Bun dependencies
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install dependencies
      run: bun install --frozen-lockfile
    
    - name: Lint TypeScript (Fast Mode)
      run: |
        # Skip pre-commit hooks that cause bottlenecks
        SKIP_HUSKY=1 bun run lint --max-warnings=0 || true
    
    - name: Check TypeScript types
      run: |
        bunx --package typescript tsc --noEmit --skipLibCheck

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 8
    needs: [test-typescript]  # Remove Python dependency for faster builds
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ env.BUN_VERSION }}

    - name: Cache Bun dependencies
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-

    - name: Install dependencies
      run: bun install --frozen-lockfile

    - name: Build project (Fast Mode)
      run: |
        # Skip pre-commit hooks during build
        SKIP_HUSKY=1 bun run build || bun run build:legacy

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: dist/
        retention-days: 1  # Reduce storage overhead

  security:
    name: Security Scan (Optional)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    continue-on-error: true  # Don't block CI on security scan failures
    
    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy security scan
      uses: aquasecurity/trivy-action@master
      continue-on-error: true
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      continue-on-error: true
      with:
        sarif_file: 'trivy-results.sarif'

  docs-check:
    name: Quick Docs Check
    runs-on: ubuntu-latest
    timeout-minutes: 2
    continue-on-error: true  # Don't block CI on docs issues
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Fast documentation check
      run: |
        # Quick check of essential files only
        echo "🔍 Quick documentation check..."
        
        test -f README.md && echo "✅ README.md" || echo "❌ README.md missing"
        test -f package.json && echo "✅ package.json" || echo "❌ package.json missing"
        test -f tsconfig.json && echo "✅ tsconfig.json" || echo "❌ tsconfig.json missing"
        
        echo "✅ Documentation check complete"