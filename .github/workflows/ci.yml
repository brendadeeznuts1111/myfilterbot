name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  NODE_ENV: test
  PYTHON_VERSION: '3.11'
  BUN_VERSION: 'latest'

jobs:
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Cache Python dependencies
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('config/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-dotenv
        pip install -r config/requirements_portal_integration.txt
        pip install pytest pytest-cov
    
    - name: Create test environment file
      run: |
        # Create minimal .env for testing
        echo "BOT_TOKEN=test_token" > .env
        echo "ADMIN_CHAT_ID=123456789" >> .env
        echo "NODE_ENV=test" >> .env
        echo "DATABASE_PATH=./test_data" >> .env
    
    - name: Run Python tests
      run: |
        python -m pytest tests/python/ -v --cov=src/bot --cov-report=xml
    
    - name: Upload Python coverage
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        flags: python
        name: python-coverage

  test-typescript:
    name: TypeScript Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ env.BUN_VERSION }}

    - name: Cache Bun dependencies
      uses: actions/cache@v4
      with:
        path: ~/.bun/install/cache
        key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
        restore-keys: |
          ${{ runner.os }}-bun-
    
    - name: Install dependencies
      run: bun install
    
    - name: Verify TypeScript configuration
      run: |
        bunx --package typescript tsc --noEmit
    
    - name: Run TypeScript tests
      run: |
        bun test --coverage
    
    - name: Upload TypeScript coverage
      uses: codecov/codecov-action@v4
      with:
        directory: ./coverage
        flags: typescript
        name: typescript-coverage

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ env.BUN_VERSION }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Cache Python linters
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-linters-${{ hashFiles('**/requirements*.txt') }}
        restore-keys: |
          ${{ runner.os }}-linters-

    - name: Install linters
      run: |
        pip install ruff black isort
        bun install
    
    - name: Lint Python
      run: |
        ruff check src/bot tests/python
        black --check src/bot tests/python
        isort --check-only src/bot tests/python
    
    - name: Lint TypeScript
      run: |
        bun run lint
    
    - name: Check formatting
      run: |
        bun run format:check

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [test-python, test-typescript]
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: ${{ env.BUN_VERSION }}

    - name: Install dependencies
      run: bun install

    - name: Build project
      run: bun run build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: dist/

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Run Trivy security scan
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy results
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: 'trivy-results.sarif'

    - name: Check for hardcoded secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: ${{ github.event.repository.default_branch }}
        head: HEAD

  documentation:
    name: Documentation Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Check documentation links
      run: |
        # Check if all referenced documentation files exist
        echo "Checking documentation completeness..."
        
        # Check main documentation files
        test -f README.md && echo "✅ README.md exists"
        test -f MIGRATION_GUIDE.md && echo "✅ MIGRATION_GUIDE.md exists"
        test -f CLAUDE.md && echo "✅ CLAUDE.md exists"
        
        # Check if .env.example exists (should be created)
        if [ -f .env.example ]; then
          echo "✅ .env.example exists"
        else
          echo "⚠️ .env.example missing - should be created"
        fi
        
        # Check TypeScript configuration
        test -f tsconfig.json && echo "✅ tsconfig.json exists"
        test -f bunfig.toml && echo "✅ bunfig.toml exists"
        
        echo "Documentation check complete"
    
    - name: Verify package.json scripts
      run: |
        echo "Verifying package.json scripts..."
        
        # Check if all referenced scripts exist
        bun run --help | grep -E "(dev|test|build|lint|format)" || echo "⚠️ Some scripts may be missing"
        
        echo "Script verification complete"