name: "Documentation Review Reminders"

on:
  schedule:
    # First Monday of each month at 9 AM UTC
    - cron: '0 9 1-7 * 1'
    # Third Monday of each month at 9 AM UTC
    - cron: '0 9 15-21 * 1'
    # Last Friday of each month at 5 PM UTC
    - cron: '0 17 25-31 * 5'
  workflow_dispatch:
    inputs:
      reminder_type:
        description: 'Type of reminder to send'
        required: true
        default: 'monthly'
        type: choice
        options:
          - monthly
          - quarterly
          - annual

jobs:
  send-review-reminder:
    name: "Send Documentation Review Reminder"
    runs-on: ubuntu-latest

    steps:
      - name: "Checkout Repository"
        uses: actions/checkout@v4

      - name: "Determine Review Type"
        id: review-type
        run: |
          if [ "${{ github.event.inputs.reminder_type }}" != "" ]; then
            echo "type=${{ github.event.inputs.reminder_type }}" >> $GITHUB_OUTPUT
          else
            day=$(date +%d)
            if [ $day -le 7 ]; then
              echo "type=comprehensive" >> $GITHUB_OUTPUT
            elif [ $day -le 21 ]; then
              echo "type=quick" >> $GITHUB_OUTPUT
            else
              echo "type=metrics" >> $GITHUB_OUTPUT
            fi
          fi

      - name: "Create Review Issue"
        uses: actions/github-script@v7
        with:
          script: |
            const reviewType = '${{ steps.review-type.outputs.type }}';
            const date = new Date().toLocaleDateString('en-US', {
              year: 'numeric',
              month: 'long',
              day: 'numeric'
            });

            let title, body;

            if (reviewType === 'comprehensive') {
              title = `Monthly Documentation Review - ${new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long' })}`;
              body = `## Monthly Comprehensive Documentation Review

            **Review Date**: ${date}
            **Review Type**: Comprehensive Monthly Review
            **Assigned Reviewers**: @documentation-team

            ### Review Checklist

            #### Content Review
            - [ ] All links are working (internal and external)
            - [ ] Code examples compile and run correctly
            - [ ] Version numbers are consistent across all documents
            - [ ] Installation instructions are accurate
            - [ ] API documentation matches current implementation
            - [ ] Screenshots and images are current
            - [ ] Contact information is up-to-date

            ### Files to Review
            - [ ] README.md
            - [ ] CONTRIBUTING.md
            - [ ] docs/README.md
            - [ ] docs/api/API_DOCUMENTATION.md
            - [ ] docs/setup/QUICKSTART.md
            - [ ] All files in docs/ directory

            **Due Date**: ${new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toLocaleDateString()}
            `;
            } else if (reviewType === 'quick') {
              title = `Quick Documentation Check - ${date}`;
              body = `## Quick Documentation Accuracy Check

            **Review Date**: ${date}
            **Review Type**: Quick Accuracy Check

            ### Quick Check Items
            - [ ] Run automated link checker
            - [ ] Verify recent code examples still work
            - [ ] Check for any urgent user feedback
            - [ ] Validate recent changes are documented

            **Due Date**: ${new Date(Date.now() + 3 * 24 * 60 * 60 * 1000).toLocaleDateString()}
            `;
            } else {
              title = `Documentation Metrics Collection - ${date}`;
              body = `## Monthly Documentation Metrics Collection

            **Collection Date**: ${date}

            ### Metrics to Collect
            - [ ] Documentation coverage percentage
            - [ ] Link health status
            - [ ] User feedback scores
            - [ ] Page view analytics

            **Due Date**: ${new Date(Date.now() + 5 * 24 * 60 * 60 * 1000).toLocaleDateString()}
            `;
            }

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['documentation', 'review', reviewType]
            });