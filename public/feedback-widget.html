<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enhanced Feedback Widget - FantDev Trading</title>
    
    <!-- Enhanced Static Assets -->
    <link rel="stylesheet" href="/static/css/utilities.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/fantdev-components.css">
    
    <style>
        /* Enhanced Feedback Widget Styles */
        .enhanced-feedback-widget {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-xl);
            max-width: 380px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            z-index: var(--z-popover);
            transition: all var(--transition-normal);
            overflow: hidden;
        }

        .enhanced-feedback-widget.minimized {
            transform: translateX(calc(100% - 60px));
        }

        .enhanced-feedback-widget:hover {
            box-shadow: var(--shadow-2xl);
            transform: translateY(-2px);
        }

        .enhanced-feedback-toggle {
            position: absolute;
            left: -40px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary);
            color: var(--text-inverse);
            border: none;
            border-radius: var(--border-radius) 0 0 var(--border-radius);
            padding: 12px 10px;
            cursor: pointer;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            font-weight: 600;
            transition: all var(--transition-fast);
            box-shadow: var(--shadow-md);
        }

        .enhanced-feedback-toggle:hover {
            background: var(--primary-dark);
            transform: translateY(-50%) scale(1.05);
        }

        .enhanced-feedback-header {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: var(--text-inverse);
            padding: 1.5rem;
            text-align: center;
            position: relative;
        }

        .enhanced-feedback-header h3 {
            margin: 0;
            font-size: var(--font-size-xl);
            font-weight: 600;
        }

        .enhanced-feedback-header p {
            margin: 0.5rem 0 0 0;
            opacity: 0.9;
            font-size: var(--font-size-sm);
        }

        .enhanced-feedback-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: var(--text-inverse);
            border-radius: var(--border-radius-full);
            width: 32px;
            height: 32px;
            cursor: pointer;
            transition: all var(--transition-fast);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .enhanced-feedback-close:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.1);
        }

        .enhanced-feedback-body {
            padding: 1.5rem;
        }

        .enhanced-feedback-question {
            margin-bottom: 1.5rem;
        }

        .enhanced-feedback-question label {
            display: block;
            margin-bottom: 0.75rem;
            font-weight: 600;
            color: var(--text-primary);
            font-size: var(--font-size-base);
        }

        .enhanced-rating-buttons {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
            justify-content: center;
        }

        .enhanced-rating-btn {
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 0.75rem 1rem;
            cursor: pointer;
            transition: all var(--transition-fast);
            font-weight: 600;
            min-width: 60px;
            text-align: center;
        }

        .enhanced-rating-btn:hover {
            background: var(--bg-hover);
            border-color: var(--primary);
            transform: translateY(-2px);
        }

        .enhanced-rating-btn.selected {
            background: var(--primary);
            color: var(--text-inverse);
            border-color: var(--primary);
            box-shadow: var(--shadow-md);
        }

        .enhanced-feedback-textarea {
            width: 100%;
            min-height: 80px;
            padding: 0.75rem;
            border: 2px solid var(--border-color);
            border-radius: var(--border-radius);
            resize: vertical;
            font-family: inherit;
            font-size: var(--font-size-sm);
            transition: all var(--transition-fast);
            background: var(--bg-surface);
            color: var(--text-primary);
        }

        .enhanced-feedback-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .enhanced-feedback-buttons {
            display: flex;
            gap: 0.75rem;
            margin-top: 1.5rem;
        }

        .enhanced-btn {
            flex: 1;
            padding: 0.75rem 1rem;
            border: none;
            border-radius: var(--border-radius);
            cursor: pointer;
            font-weight: 600;
            transition: all var(--transition-fast);
            font-size: var(--font-size-sm);
        }

        .enhanced-btn-primary {
            background: var(--primary);
            color: var(--text-inverse);
        }

        .enhanced-btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
        }

        .enhanced-btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }

        .enhanced-btn-secondary:hover {
            background: var(--bg-hover);
        }

        .enhanced-feedback-success {
            text-align: center;
            padding: 2rem 1.5rem;
            color: var(--success);
        }

        .enhanced-feedback-success h4 {
            margin: 0 0 1rem 0;
            font-size: var(--font-size-lg);
            color: var(--success);
        }

        .enhanced-feedback-success p {
            margin: 0;
            color: var(--text-secondary);
        }

        .enhanced-feedback-emoji {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        /* Responsive Design */
        @media (max-width: 480px) {
            .enhanced-feedback-widget {
                right: 10px;
                left: 10px;
                max-width: none;
            }
            
            .enhanced-feedback-widget.minimized {
                transform: translateX(calc(100% - 50px));
            }
            
            .enhanced-feedback-toggle {
                left: -35px;
                padding: 10px 8px;
            }
        }

        /* Animation Classes */
        .enhanced-feedback-widget.animate-slide-in {
            animation: slideInRight 0.3s ease-out;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        /* Loading States */
        .enhanced-feedback-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .enhanced-spinner {
            width: 24px;
            height: 24px;
            border: 3px solid var(--border-color);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="enhanced-feedback-widget" class="enhanced-feedback-widget">
        <!-- Toggle Button -->
        <button class="enhanced-feedback-toggle" id="feedback-toggle">
            💬
        </button>
        
        <!-- Header -->
        <div class="enhanced-feedback-header">
            <button class="enhanced-feedback-close" id="feedback-close">×</button>
            <h3>Help Us Improve</h3>
            <p>Your feedback helps us make FantDev Trading better</p>
        </div>
        
        <!-- Body -->
        <div class="enhanced-feedback-body" id="feedback-body">
            <!-- Question 1: Overall Experience -->
            <div class="enhanced-feedback-question">
                <label for="overall-rating">How would you rate your overall experience?</label>
                <div class="enhanced-rating-buttons" id="overall-rating">
                    <button class="enhanced-rating-btn" data-rating="1" data-label="Poor">1</button>
                    <button class="enhanced-rating-btn" data-rating="2" data-label="Fair">2</button>
                    <button class="enhanced-rating-btn" data-rating="3" data-label="Good">3</button>
                    <button class="enhanced-rating-btn" data-rating="4" data-label="Very Good">4</button>
                    <button class="enhanced-rating-btn" data-rating="5" data-label="Excellent">5</button>
                </div>
            </div>
            
            <!-- Question 2: Specific Feedback -->
            <div class="enhanced-feedback-question">
                <label for="feedback-text">What specific improvements would you suggest?</label>
                <textarea 
                    class="enhanced-feedback-textarea" 
                    id="feedback-text" 
                    placeholder="Share your thoughts, suggestions, or report any issues..."
                    maxlength="500"
                ></textarea>
                <div style="text-align: right; font-size: 0.75rem; color: var(--text-tertiary);">
                    <span id="char-count">0</span>/500
                </div>
            </div>
            
            <!-- Question 3: Category -->
            <div class="enhanced-feedback-question">
                <label for="feedback-category">What category does this feedback relate to?</label>
                <select class="enhanced-feedback-textarea" id="feedback-category">
                    <option value="">Select a category...</option>
                    <option value="user-interface">User Interface</option>
                    <option value="trading-features">Trading Features</option>
                    <option value="performance">Performance</option>
                    <option value="customer-support">Customer Support</option>
                    <option value="bug-report">Bug Report</option>
                    <option value="feature-request">Feature Request</option>
                    <option value="other">Other</option>
                </select>
            </div>
            
            <!-- Action Buttons -->
            <div class="enhanced-feedback-buttons">
                <button class="enhanced-btn enhanced-btn-secondary" id="feedback-cancel">Cancel</button>
                <button class="enhanced-btn enhanced-btn-primary" id="feedback-submit">Submit Feedback</button>
            </div>
        </div>
        
        <!-- Success State -->
        <div class="enhanced-feedback-success hidden" id="feedback-success">
            <div class="enhanced-feedback-emoji">🎉</div>
            <h4>Thank You!</h4>
            <p>Your feedback has been submitted successfully. We appreciate your input!</p>
        </div>
        
        <!-- Loading State -->
        <div class="enhanced-feedback-loading hidden" id="feedback-loading">
            <div class="enhanced-spinner"></div>
        </div>
    </div>

    <!-- Enhanced JavaScript Libraries -->
    <script src="/static/js/utils.js"></script>
    <script src="/static/js/components.js"></script>
    <script src="/static/js/icon-helper.js"></script>
    
    <script>
        class EnhancedFeedbackWidget {
            constructor() {
                this.widget = document.getElementById('enhanced-feedback-widget');
                this.toggle = document.getElementById('feedback-toggle');
                this.close = document.getElementById('feedback-close');
                this.body = document.getElementById('feedback-body');
                this.success = document.getElementById('feedback-success');
                this.loading = document.getElementById('feedback-loading');
                this.submitBtn = document.getElementById('feedback-submit');
                this.cancelBtn = document.getElementById('feedback-cancel');
                this.textarea = document.getElementById('feedback-text');
                this.charCount = document.getElementById('char-count');
                this.categorySelect = document.getElementById('feedback-category');
                
                this.ratings = {};
                this.isMinimized = false;
                this.init();
            }
            
            init() {
                this.setupEventListeners();
                this.setupCharacterCount();
                this.loadStoredData();
            }
            
            setupEventListeners() {
                // Toggle widget
                this.toggle.addEventListener('click', () => this.toggleWidget());
                
                // Close widget
                this.close.addEventListener('click', () => this.minimizeWidget());
                
                // Rating buttons
                document.querySelectorAll('.enhanced-rating-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => this.handleRating(e));
                });
                
                // Submit feedback
                this.submitBtn.addEventListener('click', () => this.submitFeedback());
                
                // Cancel feedback
                this.cancelBtn.addEventListener('click', () => this.resetForm());
                
                // Close on escape key
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && !this.isMinimized) {
                        this.minimizeWidget();
                    }
                });
                
                // Close on outside click
                document.addEventListener('click', (e) => {
                    if (!this.widget.contains(e.target) && !this.isMinimized) {
                        this.minimizeWidget();
                    }
                });
            }
            
            setupCharacterCount() {
                this.textarea.addEventListener('input', () => {
                    const count = this.textarea.value.length;
                    this.charCount.textContent = count;
                    
                    if (count > 400) {
                        this.charCount.style.color = 'var(--warning)';
                    } else if (count > 300) {
                        this.charCount.style.color = 'var(--text-tertiary)';
                    } else {
                        this.charCount.style.color = 'var(--text-tertiary)';
                    }
                });
            }
            
            handleRating(e) {
                const btn = e.target;
                const rating = btn.dataset.rating;
                const label = btn.dataset.label;
                const questionId = btn.closest('.enhanced-feedback-question').querySelector('label').textContent;
                
                // Remove previous selection from this question
                btn.closest('.enhanced-rating-buttons').querySelectorAll('.enhanced-rating-btn').forEach(b => {
                    b.classList.remove('selected');
                });
                
                // Select current rating
                btn.classList.add('selected');
                
                // Store rating
                this.ratings[questionId] = { rating, label };
            }
            
            async submitFeedback() {
                // Validate form
                if (!this.validateForm()) {
                    return;
                }
                
                // Show loading state
                this.showLoading();
                
                try {
                    // Prepare feedback data
                    const feedbackData = {
                        timestamp: new Date().toISOString(),
                        ratings: this.ratings,
                        text: this.textarea.value,
                        category: this.categorySelect.value,
                        userAgent: navigator.userAgent,
                        url: window.location.href,
                        sessionId: this.getSessionId()
                    };
                    
                    // Submit to server (replace with actual endpoint)
                    await this.submitToServer(feedbackData);
                    
                    // Show success state
                    this.showSuccess();
                    
                    // Store submission locally
                    this.storeSubmission(feedbackData);
                    
                    // Reset form after delay
                    setTimeout(() => {
                        this.resetForm();
                        this.minimizeWidget();
                    }, 3000);
                    
                } catch (error) {
                    console.error('Feedback submission failed:', error);
                    this.showError('Failed to submit feedback. Please try again.');
                }
            }
            
            validateForm() {
                const hasRating = Object.keys(this.ratings).length > 0;
                const hasText = this.textarea.value.trim().length > 0;
                const hasCategory = this.categorySelect.value;
                
                if (!hasRating) {
                    this.showError('Please provide a rating.');
                    return false;
                }
                
                if (!hasText) {
                    this.showError('Please provide feedback text.');
                    return false;
                }
                
                if (!hasCategory) {
                    this.showError('Please select a category.');
                    return false;
                }
                
                return true;
            }
            
            async submitToServer(data) {
                // Simulate API call - replace with actual endpoint
                return new Promise((resolve) => {
                    setTimeout(() => {
                        console.log('Feedback submitted:', data);
                        resolve({ success: true });
                    }, 1000);
                });
            }
            
            showLoading() {
                this.body.classList.add('hidden');
                this.success.classList.add('hidden');
                this.loading.classList.remove('hidden');
            }
            
            showSuccess() {
                this.loading.classList.add('hidden');
                this.success.classList.remove('hidden');
            }
            
            showError(message) {
                // Use the enhanced toast system if available
                if (window.FantDevComponents) {
                    window.FantDevComponents.showToast(message, 'error', 5000);
                } else {
                    alert(message);
                }
            }
            
            toggleWidget() {
                if (this.isMinimized) {
                    this.expandWidget();
                } else {
                    this.minimizeWidget();
                }
            }
            
            expandWidget() {
                this.widget.classList.remove('minimized');
                this.isMinimized = false;
                this.widget.classList.add('animate-slide-in');
            }
            
            minimizeWidget() {
                this.widget.classList.add('minimized');
                this.isMinimized = true;
            }
            
            resetForm() {
                // Clear ratings
                document.querySelectorAll('.enhanced-rating-btn').forEach(btn => {
                    btn.classList.remove('selected');
                });
                
                // Clear text
                this.textarea.value = '';
                this.charCount.textContent = '0';
                
                // Reset category
                this.categorySelect.value = '';
                
                // Clear stored ratings
                this.ratings = {};
                
                // Show form
                this.loading.classList.add('hidden');
                this.success.classList.add('hidden');
                this.body.classList.remove('hidden');
            }
            
            storeSubmission(data) {
                const submissions = JSON.parse(localStorage.getItem('fantdev-feedback') || '[]');
                submissions.push(data);
                localStorage.setItem('fantdev-feedback', JSON.stringify(submissions));
            }
            
            loadStoredData() {
                // Load any previously stored feedback data
                const stored = localStorage.getItem('fantdev-feedback');
                if (stored) {
                    console.log('Stored feedback submissions:', JSON.parse(stored));
                }
            }
            
            getSessionId() {
                let sessionId = sessionStorage.getItem('fantdev-session-id');
                if (!sessionId) {
                    sessionId = 'session_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                    sessionStorage.setItem('fantdev-session-id', sessionId);
                }
                return sessionId;
            }
        }
        
        // Initialize enhanced feedback widget
        document.addEventListener('DOMContentLoaded', () => {
            new EnhancedFeedbackWidget();
        });
    </script>
</body>
</html>
