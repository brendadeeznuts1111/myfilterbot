<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Admin Dashboard - Enhanced Trading System</title>
    
    <!-- Enhanced Static Assets -->
    <link rel="stylesheet" href="/static/css/utilities.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <link rel="stylesheet" href="/static/css/advanced-components.css">
    <link rel="stylesheet" href="/static/css/fantdev-components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Enhanced JavaScript Libraries -->
    <script src="/static/js/utils.js" defer></script>
    <script src="/static/js/components.js" defer></script>
    <script src="/static/js/advanced-components.js" defer></script>
    <script src="/static/js/icon-helper.js" defer></script>
    <style>
        /* Component-specific overrides and customizations */
        :root {
            
            /* Z-index layers */
            --z-dropdown: 1000;
            --z-modal: 2000;
            --z-toast: 3000;
            --z-loading: 4000;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--gray-50);
            color: var(--gray-900);
            line-height: 1.5;
            min-height: 100vh;
        }

        /* Toast Notification Container - Fixed positioning */
        .toast-container {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: var(--z-toast);
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            max-width: 400px;
            pointer-events: none;
        }

        .toast {
            background: var(--white);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            padding: 1rem;
            border-left: 4px solid var(--primary);
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            animation: slideInRight 0.3s ease-out;
            transition: var(--transition);
            pointer-events: auto;
            min-width: 300px;
        }

        .toast.success { border-left-color: var(--success); }
        .toast.error { border-left-color: var(--danger); }
        .toast.warning { border-left-color: var(--warning); }
        .toast.info { border-left-color: var(--info); }

        .toast-icon {
            flex-shrink: 0;
            width: 1.25rem;
            height: 1.25rem;
            margin-top: 0.125rem;
        }

        .toast-content {
            flex: 1;
        }

        .toast-title {
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 0.25rem;
            font-size: 0.875rem;
        }

        .toast-message {
            font-size: 0.8125rem;
            color: var(--gray-600);
            line-height: 1.4;
        }

        .toast-close {
            background: none;
            border: none;
            color: var(--gray-400);
            cursor: pointer;
            padding: 0.25rem;
            border-radius: var(--radius);
            transition: var(--transition);
            width: 1.5rem;
            height: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
        }

        .toast-close:hover {
            background: var(--gray-100);
            color: var(--gray-600);
        }

        .toast-close:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            from {
                opacity: 1;
                transform: translateX(0);
            }
            to {
                opacity: 0;
                transform: translateX(100%);
            }
        }

        .toast.removing {
            animation: fadeOut 0.3s ease-in forwards;
        }

        /* Loading Overlay */
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: var(--z-loading);
        }

        .loading-overlay.active {
            display: flex;
        }

        .loading-content {
            background: var(--white);
            border-radius: var(--radius-xl);
            padding: 2rem;
            box-shadow: var(--shadow-xl);
            text-align: center;
            min-width: 200px;
            max-width: 400px;
        }

        .spinner {
            width: 3rem;
            height: 3rem;
            border: 3px solid var(--gray-200);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-title {
            font-weight: 600;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }

        .loading-message {
            color: var(--gray-600);
            font-size: 0.875rem;
        }

        /* Container and Layout */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 1rem;
        }

        /* Header */
        .header {
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            padding: 1.5rem 0;
            margin-bottom: 2rem;
            box-shadow: var(--shadow-sm);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .header-title {
            font-size: 1.875rem;
            font-weight: 700;
            color: var(--gray-900);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .header-badge {
            background: var(--primary-light);
            color: var(--primary-dark);
            padding: 0.25rem 0.75rem;
            border-radius: var(--radius);
            font-size: 0.875rem;
            font-weight: 600;
        }

        /* Navigation Tabs */
        .nav-tabs {
            background: var(--white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            padding: 0.5rem;
            display: flex;
            gap: 0.25rem;
            overflow-x: auto;
            margin-bottom: 2rem;
        }

        .nav-tab {
            padding: 0.75rem 1.5rem;
            border: none;
            background: none;
            color: var(--gray-600);
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            position: relative;
        }

        .nav-tab:hover:not(.active) {
            color: var(--gray-900);
            background: var(--gray-50);
        }

        .nav-tab.active {
            color: var(--primary);
            background: var(--primary-light);
            font-weight: 600;
        }

        .nav-tab:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* Tab Content */
        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease-in-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { 
                opacity: 0; 
                transform: translateY(1rem); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        /* Cards */
        .card {
            background: var(--white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-md);
            overflow: hidden;
            border: 1px solid var(--gray-200);
        }

        .card-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--gray-200);
            background: var(--gray-50);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--gray-900);
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .card-body {
            padding: 1.5rem;
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            white-space: nowrap;
            min-width: fit-content;
            position: relative;
            overflow: hidden;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }

        .btn:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--gray-100);
            color: var(--gray-700);
        }

        .btn-secondary:hover:not(:disabled) {
            background: var(--gray-200);
        }

        .btn-success {
            background: var(--success);
            color: var(--white);
        }

        .btn-success:hover:not(:disabled) {
            background: #059669;
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--danger);
            color: var(--white);
        }

        .btn-danger:hover:not(:disabled) {
            background: #dc2626;
            transform: translateY(-1px);
        }

        .btn-loading {
            pointer-events: none;
        }

        .btn-loading::after {
            content: '';
            position: absolute;
            width: 1rem;
            height: 1rem;
            border: 2px solid transparent;
            border-top: 2px solid currentColor;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 0.5rem;
        }

        .btn-loading .btn-text {
            opacity: 0.7;
        }

        /* Statistics Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-200);
            transition: var(--transition);
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }

        .stat-header {
            display: flex;
            justify-content: between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .stat-title {
            font-size: 0.875rem;
            color: var(--gray-600);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .stat-icon {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            margin-left: auto;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }

        .stat-change {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            font-size: 0.875rem;
        }

        .stat-change.positive {
            color: var(--success);
        }

        .stat-change.negative {
            color: var(--danger);
        }

        .stat-change.neutral {
            color: var(--gray-500);
        }

        /* Tables */
        .table-container {
            background: var(--white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid var(--gray-200);
        }

        .table-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--gray-200);
            background: var(--gray-50);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .table-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--gray-900);
            margin: 0;
        }

        .table-actions {
            display: flex;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th {
            text-align: left;
            padding: 1rem;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--gray-500);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            background: var(--gray-50);
            border-bottom: 1px solid var(--gray-200);
        }

        .table td {
            padding: 1rem;
            font-size: 0.875rem;
            color: var(--gray-900);
            border-bottom: 1px solid var(--gray-100);
        }

        .table tbody tr:hover {
            background: var(--gray-25);
        }

        .table tbody tr:last-child td {
            border-bottom: none;
        }

        /* Status badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.375rem 0.75rem;
            border-radius: var(--radius);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .status-badge.pending {
            background: rgb(245 158 11 / 0.1);
            color: var(--warning);
        }

        .status-badge.approved {
            background: rgb(16 185 129 / 0.1);
            color: var(--success);
        }

        .status-badge.rejected {
            background: rgb(239 68 68 / 0.1);
            color: var(--danger);
        }

        .status-badge.processing {
            background: rgb(59 130 246 / 0.1);
            color: var(--primary);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--gray-500);
        }

        .empty-state-icon {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 0.5rem;
        }

        .empty-state-description {
            font-size: 0.875rem;
            color: var(--gray-500);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: var(--z-modal);
            padding: 1rem;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            max-width: 90vw;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalSlideIn 0.3s ease-out;
            width: 100%;
            max-width: 500px;
        }

        @keyframes modalSlideIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(-1rem);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--gray-200);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--gray-900);
            margin: 0;
        }

        .modal-close {
            background: var(--gray-100);
            border: none;
            width: 2rem;
            height: 2rem;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--gray-500);
            transition: var(--transition);
        }

        .modal-close:hover {
            background: var(--gray-200);
            color: var(--gray-700);
        }

        .modal-close:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        .modal-body {
            padding: 1.5rem;
        }

        .modal-footer {
            padding: 1.5rem;
            border-top: 1px solid var(--gray-200);
            display: flex;
            justify-content: flex-end;
            gap: 0.75rem;
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--gray-700);
            margin-bottom: 0.5rem;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            transition: var(--transition);
            background: var(--white);
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-light);
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .container {
                padding: 1rem;
            }

            .header-content {
                flex-direction: column;
                align-items: flex-start;
            }

            .nav-tabs {
                flex-wrap: wrap;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .table-header {
                flex-direction: column;
                align-items: flex-start;
            }

            .table-actions {
                width: 100%;
                justify-content: space-between;
            }

            .toast-container {
                left: 1rem;
                right: 1rem;
                max-width: none;
            }
        }

        /* Accessibility improvements */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Focus indicators */
        *:focus-visible {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
        }

        /* Screen reader only */
        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* Enhanced Navigation Styles */
        .enhanced-navigation {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--gray-200);
        }

        /* Breadcrumb Navigation */
        .breadcrumb-nav {
            display: flex;
            align-items: center;
        }

        .breadcrumb-list {
            display: flex;
            align-items: center;
            list-style: none;
            margin: 0;
            padding: 0;
        }

        .breadcrumb-item {
            display: flex;
            align-items: center;
        }

        .breadcrumb-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s ease;
        }

        .breadcrumb-link:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .breadcrumb-separator {
            margin: 0 0.5rem;
            color: var(--gray-400);
        }

        .breadcrumb-current {
            color: var(--gray-600);
            font-weight: 600;
        }

        /* Section Indicator */
        .section-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: var(--gray-50);
            border-radius: var(--radius-lg);
            border: 1px solid var(--gray-200);
        }

        .section-label {
            font-size: 0.875rem;
            color: var(--gray-600);
        }

        .section-name {
            font-weight: 600;
            color: var(--gray-900);
        }

        /* Enhanced Floating Action Button */
        .enhanced-fab {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: var(--z-dropdown);
        }

        .fab-tooltip {
            position: absolute;
            right: 100%;
            top: 50%;
            transform: translateY(-50%);
            margin-right: 1rem;
            padding: 0.5rem 0.75rem;
            background: var(--gray-900);
            color: var(--white);
            border-radius: var(--radius);
            font-size: 0.875rem;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .enhanced-fab:hover .fab-tooltip {
            opacity: 1;
        }

        .fab-button {
            width: 3.5rem;
            height: 3.5rem;
            border-radius: 50%;
            background: var(--primary);
            color: var(--white);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            box-shadow: var(--shadow-lg);
            transition: all 0.2s ease;
        }

        .fab-button:hover {
            background: var(--primary-dark);
            transform: scale(1.1);
            box-shadow: var(--shadow-xl);
        }

        .fab-menu {
            position: absolute;
            bottom: 100%;
            right: 0;
            margin-bottom: 1rem;
            display: none;
            flex-direction: column;
            gap: 0.5rem;
        }

        .enhanced-fab.active .fab-menu {
            display: flex;
        }

        .fab-item {
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 50%;
            background: var(--white);
            color: var(--gray-700);
            border: 1px solid var(--gray-200);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .fab-item:hover {
            background: var(--primary);
            color: var(--white);
            border-color: var(--primary);
            transform: scale(1.1);
        }

        /* Back to Top Button */
        .back-to-top {
            position: fixed;
            bottom: 2rem;
            left: 2rem;
            width: 3rem;
            height: 3rem;
            border-radius: 50%;
            background: var(--gray-600);
            color: var(--white);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            box-shadow: var(--shadow-md);
            transition: all 0.3s ease;
            opacity: 0;
            visibility: hidden;
            transform: translateY(1rem);
        }

        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .back-to-top:hover {
            background: var(--gray-700);
            transform: translateY(-0.25rem);
            box-shadow: var(--shadow-lg);
        }

        /* Responsive Design */
        @media (max-width: 768px) {

    <script>
        // Application Configuration
        const CONFIG = {
            API_BASE_URL: 'http://localhost:3001/api/dashboard',
            REFRESH_INTERVAL: 30000, // 30 seconds
            TOAST_DURATION: 4000,
            MAX_RETRY_ATTEMPTS: 3,
            LOADING_MIN_DURATION: 500, // Minimum loading time for better UX
            RISK_THRESHOLDS: {
                HIGH: 5000,
                MEDIUM: 1000,
                LOW: 100
            },
            PAYMENT_METHODS: [
                { id: 'btc', name: 'Bitcoin', icon: 'fab fa-bitcoin' },
                { id: 'eth', name: 'Ethereum', icon: 'fab fa-ethereum' },
                { id: 'bank', name: 'Bank Transfer', icon: 'fas fa-university' },
                { id: 'card', name: 'Credit Card', icon: 'fas fa-credit-card' }
            ]
        };

        // Application State Management
        class AppState {
            constructor() {
                this.currentTab = 'overview';
                this.data = {
                    statistics: null,
                    transactions: [],
                    withdrawals: [],
                    verifications: [],
                    settings: {}
                };
                this.ui = {
                    loading: false,
                    error: null,
                    lastRefresh: null
                };
                this.filters = {
                    withdrawalStatus: '',
                    dateRange: 'all'
                };
                this.cache = new Map();
                this.retryAttempts = new Map();
            }

            updateData(key, value) {
                this.data[key] = value;
                this.notifyObservers(key, value);
            }

            setLoading(isLoading, message = 'Loading...') {
                this.ui.loading = isLoading;
                if (isLoading) {
                    showLoading(message);
                } else {
                    hideLoading();
                }
            }

            setError(error) {
                this.ui.error = error;
                if (error) {
                    showNotification(error.message || 'An error occurred', 'error');
                }
            }

            clearError() {
                this.ui.error = null;
            }

            // Simple observer pattern
            notifyObservers(key, value) {
                // Could implement observers here for reactive updates
                console.debug(`Data updated: ${key}`, value);
            }
        }

        // Global state instance
        const appState = new AppState();

        // Utility Functions
        class Utils {
            static async delay(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }

            static formatCurrency(amount) {
                try {
                    return new Intl.NumberFormat('en-US', {
                        style: 'currency',
                        currency: 'USD',
                        minimumFractionDigits: 2
                    }).format(amount);
                } catch (error) {
                    console.warn('Currency formatting failed:', error);
                    return `$${amount.toFixed(2)}`;
                }
            }

            static formatDate(date) {
                try {
                    return new Intl.DateTimeFormat('en-US', {
                        year: 'numeric',
                        month: 'short',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    }).format(new Date(date));
                } catch (error) {
                    console.warn('Date formatting failed:', error);
                    return new Date(date).toLocaleString();
                }
            }

            static debounce(func, wait) {
                let timeout;
                return function executedFunction(...args) {
                    const later = () => {
                        clearTimeout(timeout);
                        func(...args);
                    };
                    clearTimeout(timeout);
                    timeout = setTimeout(later, wait);
                };
            }

            static getRiskLevel(amount) {
                if (amount >= CONFIG.RISK_THRESHOLDS.HIGH) return { level: 'high', color: 'danger' };
                if (amount >= CONFIG.RISK_THRESHOLDS.MEDIUM) return { level: 'medium', color: 'warning' };
                return { level: 'low', color: 'success' };
            }

            static generateId() {
                return Math.random().toString(36).substr(2, 9);
            }

            static sanitizeHTML(str) {
                const temp = document.createElement('div');
                temp.textContent = str;
                return temp.innerHTML;
            }
        }

        // API Service with proper error handling
        class ApiService {
            static async request(endpoint, options = {}) {
                const url = `${CONFIG.API_BASE_URL}${endpoint}`;
                const defaultOptions = {
                    headers: {
                        'Content-Type': 'application/json',
                    },
                };

                const config = { ...defaultOptions, ...options };
                const retryKey = `${options.method || 'GET'}-${endpoint}`;
                let attempts = appState.retryAttempts.get(retryKey) || 0;

                try {
                    // Check cache first for GET requests
                    if (!options.method || options.method === 'GET') {
                        const cached = appState.cache.get(endpoint);
                        if (cached && Date.now() - cached.timestamp < 60000) { // 1 minute cache
                            return cached.data;
                        }
                    }

                    const response = await fetch(url, config);
                    
                    if (!response.ok) {
                        const errorData = await response.json().catch(() => ({}));
                        throw new Error(errorData.message || `HTTP ${response.status}: ${response.statusText}`);
                    }

                    const data = await response.json();
                    
                    // Cache successful GET requests
                    if (!options.method || options.method === 'GET') {
                        appState.cache.set(endpoint, {
                            data,
                            timestamp: Date.now()
                        });
                    }

                    // Reset retry counter on success
                    appState.retryAttempts.delete(retryKey);
                    
                    return data;
                } catch (error) {
                    console.error(`API request failed: ${endpoint}`, error);
                    
                    // Implement retry logic for certain errors
                    if (attempts < CONFIG.MAX_RETRY_ATTEMPTS && this.shouldRetry(error)) {
                        appState.retryAttempts.set(retryKey, attempts + 1);
                        await Utils.delay(Math.pow(2, attempts) * 1000); // Exponential backoff
                        return this.request(endpoint, options);
                    }
                    
                    appState.retryAttempts.delete(retryKey);
                    throw error;
                }
            }

            static shouldRetry(error) {
                // Retry on network errors, 5xx errors, but not 4xx errors
                return error.message.includes('fetch') || 
                       error.message.includes('5') ||
                       error.message.includes('timeout');
            }

            // Mock API responses for demonstration
            static async mockRequest(endpoint, delay = 800) {
                // Try real API first, fallback to mock if needed
                try {
                    return await this.request(endpoint);
                } catch (error) {
                    console.warn(`API call failed, using mock data for ${endpoint}:`, error);
                    await Utils.delay(delay);
                    
                    switch (endpoint) {
                        case '/statistics':
                        case '/stats':
                            return this.generateMockStatistics();
                        case '/transactions':
                            return this.generateMockTransactions();
                        case '/withdrawals':
                            return this.generateMockWithdrawals();
                        case '/verifications':
                            return this.generateMockVerifications();
                        default:
                            throw new Error(`Unknown endpoint: ${endpoint}`);
                    }
                }
            }

            static generateMockStatistics() {
                return {
                    totalBalance: 1245670.50,
                    pendingWithdrawals: 89,
                    processingTime: 2.4,
                    successRate: 98.7,
                    dailyVolume: 567890.25,
                    activeUsers: 1247
                };
            }

            static generateMockTransactions() {
                const transactions = [];
                const types = ['deposit', 'withdrawal', 'transfer'];
                const statuses = ['completed', 'pending', 'failed'];
                
                for (let i = 0; i < 15; i++) {
                    transactions.push({
                        id: `TXN-${Date.now()}-${i}`,
                        type: types[Math.floor(Math.random() * types.length)],
                        amount: Math.random() * 10000 + 100,
                        status: statuses[Math.floor(Math.random() * statuses.length)],
                        user: `User ${i + 1}`,
                        timestamp: new Date(Date.now() - Math.random() * 86400000 * 7).toISOString(),
                        paymentMethod: CONFIG.PAYMENT_METHODS[Math.floor(Math.random() * CONFIG.PAYMENT_METHODS.length)]
                    });
                }
                
                return transactions.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            }

            static generateMockWithdrawals() {
                const withdrawals = [];
                const statuses = ['pending', 'processing', 'approved', 'rejected'];
                
                for (let i = 0; i < 12; i++) {
                    const amount = Math.random() * 5000 + 50;
                    withdrawals.push({
                        id: `WD-${Date.now()}-${i}`,
                        amount,
                        status: statuses[Math.floor(Math.random() * statuses.length)],
                        user: `User ${i + 1}`,
                        timestamp: new Date(Date.now() - Math.random() * 86400000 * 3).toISOString(),
                        paymentMethod: CONFIG.PAYMENT_METHODS[Math.floor(Math.random() * CONFIG.PAYMENT_METHODS.length)],
                        riskLevel: Utils.getRiskLevel(amount)
                    });
                }
                
                return withdrawals.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            }

            static generateMockVerifications() {
                const verifications = [];
                const types = ['identity', 'address', 'payment'];
                const statuses = ['pending', 'approved', 'rejected'];
                
                for (let i = 0; i < 8; i++) {
                    verifications.push({
                        id: `VER-${Date.now()}-${i}`,
                        type: types[Math.floor(Math.random() * types.length)],
                        status: statuses[Math.floor(Math.random() * statuses.length)],
                        user: `User ${i + 1}`,
                        timestamp: new Date(Date.now() - Math.random() * 86400000 * 5).toISOString()
                    });
                }
                
                return verifications.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            }
        }

        // UI Management
        class UIManager {
            static renderStatistics(stats) {
                const container = document.getElementById('statsGrid');
                if (!container) return;

                const statisticsConfig = [
                    {
                        title: 'Total Balance',

                container.innerHTML = statisticsConfig.map(stat => `

                        <div class="stat-change ${stat.changeType}">
                            <i class="fas fa-arrow-${stat.changeType === 'positive' ? 'up' : stat.changeType === 'negative' ? 'down' : 'right'}" aria-hidden="true"></i>
                            ${Utils.sanitizeHTML(stat.change)} from last period
                        </div>

                `).join('');
            }

            static renderTransactions(transactions) {
                const container = document.getElementById('transactionsTableBody');

                                <th>Type</th>
                                <th>Amount</th>
                                <th>User</th>
                                <th>Payment Method</th>
                                <th>Status</th>
                                <th>Date</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${transactions.map(tx => `
                                <tr>
                                    <td><code>${Utils.sanitizeHTML(tx.id)}</code></td>

                                        <i class="${tx.paymentMethod.icon}" aria-hidden="true"></i>

            static renderWithdrawals(withdrawals) {

                if (withdrawals.length === 0) {
                    container.innerHTML = this.renderEmptyState('No withdrawals found', 'fas fa-money-bill-wave');
                    return;

                const tableHTML = `
                    <table class="table">
                        <thead>

                                <th>User</th>
                                <th>Payment Method</th>
                                <th>Risk Level</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${withdrawals.map(wd => `
                                <tr>
                                    <td><code>${Utils.sanitizeHTML(wd.id)}</code></td>

                                        <i class="${wd.paymentMethod.icon}" aria-hidden="true"></i>

                                    <td>${Utils.formatDate(wd.timestamp)}</td>
                                    <td>
                                        ${wd.status === 'pending' ? `
                                            <button class="btn btn-success btn-sm" 
                                                    onclick="approveWithdrawal('${wd.id}')"
                                                    aria-label="Approve withdrawal ${wd.id}">
                                                <i class="fas fa-check" aria-hidden="true"></i>
                                            </button>
                                            <button class="btn btn-danger btn-sm" 
                                                    onclick="showRejectModal('${wd.id}')"
                                                    aria-label="Reject withdrawal ${wd.id}">
                                                <i class="fas fa-times" aria-hidden="true"></i>
                                            </button>
                                        ` : '—'}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;

                container.innerHTML = tableHTML;
            }

            static renderVerifications(verifications) {
                const container = document.getElementById('verificationTableBody');
                if (!container) return;

                if (verifications.length === 0) {
                    container.innerHTML = this.renderEmptyState('No verifications pending', 'fas fa-user-check');
                    return;
                }

                const tableHTML = `
                    <table class="table">
                        <thead>
                            <tr>
                                <th>Verification ID</th>
                                <th>Type</th>
                                <th>User</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${verifications.map(ver => `
                                <tr>
                                    <td><code>${Utils.sanitizeHTML(ver.id)}</code></td>
                                    <td style="text-transform: capitalize;">${Utils.sanitizeHTML(ver.type)}</td>
                                    <td>${Utils.sanitizeHTML(ver.user)}</td>
                                    <td>
                                        <span class="status-badge ${ver.status}">
                                            ${Utils.sanitizeHTML(ver.status)}
                                        </span>
                                    </td>
                                    <td>${Utils.formatDate(ver.timestamp)}</td>
                                    <td>
                                        ${ver.status === 'pending' ? `
                                            <button class="btn btn-success btn-sm" 
                                                    onclick="approveVerification('${ver.id}')"
                                                    aria-label="Approve verification ${ver.id}">
                                                <i class="fas fa-check" aria-hidden="true"></i>
                                            </button>
                                            <button class="btn btn-danger btn-sm" 
                                                    onclick="showRejectModal('${ver.id}', 'verification')"
                                                    aria-label="Reject verification ${ver.id}">
                                                <i class="fas fa-times" aria-hidden="true"></i>
                                            </button>
                                        ` : '—'}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                `;

                container.innerHTML = tableHTML;
            }

            static renderEmptyState(message, iconClass) {
                return `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            <i class="${iconClass}" aria-hidden="true"></i>
                        </div>
                        <div class="empty-state-title">${Utils.sanitizeHTML(message)}</div>
                        <div class="empty-state-description">Data will appear here when available</div>
                    </div>
                `;
            }
        }

        // Data Loading Functions with proper error handling
        async function loadStatistics() {
            try {
                appState.setLoading(true, 'Loading statistics...');
                const stats = await ApiService.mockRequest('/statistics');
                appState.updateData('statistics', stats);
                UIManager.renderStatistics(stats);
                appState.ui.lastRefresh = new Date();
            } catch (error) {
                console.error('Failed to load statistics:', error);
                appState.setError(error);
                showNotification('Failed to load statistics. Please try again.', 'error');
            } finally {
                appState.setLoading(false);
            }
        }

        async function loadTransactions() {
            try {
                if (appState.currentTab !== 'overview') return;
                
                const transactions = await ApiService.mockRequest('/transactions');
                appState.updateData('transactions', transactions);
                UIManager.renderTransactions(transactions);
            } catch (error) {
                console.error('Failed to load transactions:', error);
                UIManager.renderTransactions([]);
                showNotification('Failed to load transactions', 'error');
            }
        }

        async function loadPendingWithdrawals() {
            try {
                const btn = event?.target.closest('.btn');
                if (btn) setButtonLoading(btn, true);

                appState.setLoading(true, 'Loading withdrawals...');
                const withdrawals = await ApiService.mockRequest('/withdrawals');
                
                // Apply current filter
                const filtered = filterWithdrawalsByStatus(withdrawals, appState.filters.withdrawalStatus);
                
                appState.updateData('withdrawals', withdrawals);
                UIManager.renderWithdrawals(filtered);
                showNotification('Withdrawals refreshed successfully', 'success');
            } catch (error) {
                console.error('Failed to load withdrawals:', error);
                UIManager.renderWithdrawals([]);
                showNotification('Failed to load withdrawals', 'error');
            } finally {
                appState.setLoading(false);
                if (btn) setButtonLoading(btn, false);
            }
        }

        async function loadVerificationQueue() {
            try {
                const btn = event?.target.closest('.btn');
                if (btn) setButtonLoading(btn, true);

                appState.setLoading(true, 'Loading verifications...');
                const verifications = await ApiService.mockRequest('/verifications');
                appState.updateData('verifications', verifications);
                UIManager.renderVerifications(verifications);
                showNotification('Verification queue refreshed', 'success');
            } catch (error) {
                console.error('Failed to load verifications:', error);
                UIManager.renderVerifications([]);
                showNotification('Failed to load verification queue', 'error');
            } finally {
                appState.setLoading(false);
                if (btn) setButtonLoading(btn, false);
            }
        }

        // Filtering Functions
        function filterWithdrawalsByStatus(withdrawals, status) {
            if (!status) return withdrawals;
            return withdrawals.filter(wd => wd.status === status);
        }

        function filterWithdrawals(status) {
            appState.filters.withdrawalStatus = status;
            const filtered = filterWithdrawalsByStatus(appState.data.withdrawals || [], status);
            UIManager.renderWithdrawals(filtered);
        }

        // Action Functions
        async function approveWithdrawal(withdrawalId) {
            try {
                appState.setLoading(true, 'Approving withdrawal...');
                
                // Mock API call
                await Utils.delay(1000);
                
                // Update local data
                const withdrawals = appState.data.withdrawals.map(wd => 
                    wd.id === withdrawalId ? { ...wd, status: 'approved' } : wd
                );
                
                appState.updateData('withdrawals', withdrawals);
                const filtered = filterWithdrawalsByStatus(withdrawals, appState.filters.withdrawalStatus);
                UIManager.renderWithdrawals(filtered);
                
                showNotification('Withdrawal approved successfully', 'success');
            } catch (error) {
                console.error('Failed to approve withdrawal:', error);
                showNotification('Failed to approve withdrawal', 'error');
            } finally {
                appState.setLoading(false);
            }
        }

        async function approveVerification(verificationId) {
            try {
                appState.setLoading(true, 'Approving verification...');
                
                // Mock API call
                await Utils.delay(800);
                
                // Update local data
                const verifications = appState.data.verifications.map(ver => 
                    ver.id === verificationId ? { ...ver, status: 'approved' } : ver
                );
                
                appState.updateData('verifications', verifications);
                UIManager.renderVerifications(verifications);
                
                showNotification('Verification approved successfully', 'success');
            } catch (error) {
                console.error('Failed to approve verification:', error);
                showNotification('Failed to approve verification', 'error');
            } finally {
                appState.setLoading(false);
            }
        }

        // Modal Management
        let currentRejectionTarget = null;
        let currentRejectionType = 'withdrawal';

        function showRejectModal(targetId, type = 'withdrawal') {
            currentRejectionTarget = targetId;
            currentRejectionType = type;
            
            const modal = document.getElementById('rejectionModal');
            const title = document.getElementById('rejectionModalTitle');
            const textarea = document.getElementById('rejectionReason');
            
            title.textContent = `Reject ${type.charAt(0).toUpperCase() + type.slice(1)}`;
            textarea.value = '';
            textarea.focus();
            
            showModal('rejectionModal');
        }

        async function confirmRejection() {
            const reason = document.getElementById('rejectionReason').value.trim();
            
            if (!reason) {
                showNotification('Please provide a reason for rejection', 'warning');
                return;
            }

            try {
                const btn = document.getElementById('confirmRejectBtn');
                setButtonLoading(btn, true);

                // Mock API call
                await Utils.delay(1000);
                
                // Update local data based on type
                if (currentRejectionType === 'withdrawal') {
                    const withdrawals = appState.data.withdrawals.map(wd => 
                        wd.id === currentRejectionTarget 
                            ? { ...wd, status: 'rejected', rejectionReason: reason } 
                            : wd
                    );
                    appState.updateData('withdrawals', withdrawals);
                    const filtered = filterWithdrawalsByStatus(withdrawals, appState.filters.withdrawalStatus);
                    UIManager.renderWithdrawals(filtered);
                } else {
                    const verifications = appState.data.verifications.map(ver => 
                        ver.id === currentRejectionTarget 
                            ? { ...ver, status: 'rejected', rejectionReason: reason } 
                            : ver
                    );
                    appState.updateData('verifications', verifications);
                    UIManager.renderVerifications(verifications);
                }
                
                closeModal('rejectionModal');
                showNotification(`${currentRejectionType.charAt(0).toUpperCase() + currentRejectionType.slice(1)} rejected successfully`, 'info');
            } catch (error) {
                console.error('Failed to reject:', error);
                showNotification('Failed to process rejection', 'error');
            } finally {
                setButtonLoading(document.getElementById('confirmRejectBtn'), false);
            }
        }

        // Modal utility functions
        function showModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.add('active');
                // Focus first focusable element
                const firstFocusable = modal.querySelector('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
                if (firstFocusable) firstFocusable.focus();
            }
        }

        function closeModal(modalId) {
            const modal = document.getElementById(modalId);
            if (modal) {
                modal.classList.remove('active');
            }
        }

        // Tab switching with proper error handling and accessibility
        function switchTab(event, tabName) {
            try {
                // Prevent default behavior
                if (event) {
                    event.preventDefault();
                }

                // Update tab buttons - using event.currentTarget for robustness
                document.querySelectorAll('.nav-tab').forEach(tab => {
                    tab.classList.remove('active');
                    tab.setAttribute('aria-selected', 'false');
                });

                const activeTab = event ? event.currentTarget : document.querySelector(`[data-tab="${tabName}"]`);
                if (activeTab) {
                    activeTab.classList.add('active');
                    activeTab.setAttribute('aria-selected', 'true');
                }

                // Update tab panels
                document.querySelectorAll('.tab-content').forEach(panel => {
                    panel.classList.remove('active');
                });

                const activePanel = document.getElementById(`${tabName}-panel`);
                if (activePanel) {
                    activePanel.classList.add('active');
                }

                // Update state
                appState.currentTab = tabName;

                // Update section indicator
                updateSectionIndicator(tabName.charAt(0).toUpperCase() + tabName.slice(1));

                // Load data for specific tabs
                loadTabData(tabName);

                // Announce tab change to screen readers
                const announcement = document.createElement('div');
                announcement.setAttribute('aria-live', 'polite');
                announcement.setAttribute('aria-atomic', 'true');
                announcement.className = 'sr-only';
                announcement.textContent = `Switched to ${tabName} tab`;
                document.body.appendChild(announcement);
                setTimeout(() => document.body.removeChild(announcement), 1000);

            } catch (error) {
                console.error('Error switching tabs:', error);
                showNotification('Error switching tabs', 'error');
            }
        }

        async function loadTabData(tabName) {
            try {
                appState.clearError();
                
                switch (tabName) {
                    case 'overview':
                        await Promise.all([loadStatistics(), loadTransactions()]);
                        break;
                    case 'withdrawals':
                        await loadPendingWithdrawals();
                        break;
                    case 'verification':
                        await loadVerificationQueue();
                        break;
                    case 'analytics':
                        // Analytics would load here
                        break;
                    case 'settings':
                        // Settings would load here
                        break;
                }
            } catch (error) {
                console.error(`Error loading data for ${tabName}:`, error);
                // Error is already handled by individual load functions
            }
        }

        // Refresh function with proper loading state
        async function refreshTransactions() {
            try {
                const btn = event?.target.closest('.btn');
                if (btn) setButtonLoading(btn, true);

                await loadTransactions();
                showNotification('Transactions refreshed successfully', 'success');
            } catch (error) {
                console.error('Failed to refresh transactions:', error);
                showNotification('Failed to refresh transactions', 'error');
            } finally {
                if (btn) setButtonLoading(btn, false);
            }
        }

        // Export function
        async function exportData(type) {
            try {
                const btn = event?.target.closest('.btn');
                if (btn) setButtonLoading(btn, true);

                // Mock export process
                await Utils.delay(2000);
                
                // In real implementation, would generate and download file
                showNotification(`${type.charAt(0).toUpperCase() + type.slice(1)} exported successfully`, 'success');
            } catch (error) {
                console.error('Failed to export:', error);
                showNotification('Export failed', 'error');
            } finally {
                if (btn) setButtonLoading(btn, false);
            }
        }

        // Settings handling
        async function saveSettings(event) {
            if (event) {
                event.preventDefault();
            }

            try {
                const btn = document.querySelector('#settingsForm .btn-primary');
                if (btn) setButtonLoading(btn, true);

                // Get form data
                const formData = new FormData(document.getElementById('settingsForm'));
                const settings = Object.fromEntries(formData.entries());
                
                // Mock save
                await Utils.delay(1500);
                
                appState.updateData('settings', settings);
                showNotification('Settings saved successfully', 'success');
            } catch (error) {
                console.error('Failed to save settings:', error);
                showNotification('Failed to save settings', 'error');
            } finally {
                const btn = document.querySelector('#settingsForm .btn-primary');
                if (btn) setButtonLoading(btn, false);
            }
        }

        // Button loading state management
        function setButtonLoading(button, isLoading) {
            if (!button) return;

            if (isLoading) {
                button.classList.add('btn-loading');
                button.disabled = true;
            } else {
                button.classList.remove('btn-loading');
                button.disabled = false;
            }
        }

        // Loading overlay management
        function showLoading(message = 'Loading...') {
            const overlay = document.getElementById('loadingOverlay');
            const title = document.getElementById('loadingTitle');
            const messageEl = document.getElementById('loadingMessage');
            
            if (overlay && title && messageEl) {
                title.textContent = 'Loading';
                messageEl.textContent = message;
                overlay.classList.add('active');
            }
        }

        function hideLoading() {
            setTimeout(() => {
                const overlay = document.getElementById('loadingOverlay');
                if (overlay) {
                    overlay.classList.remove('active');
                }
            }, CONFIG.LOADING_MIN_DURATION);
        }

        // Toast notification system with proper container management
        function showNotification(message, type = 'info', duration = CONFIG.TOAST_DURATION) {
            const container = document.getElementById('toastContainer');
            if (!container) return;

            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.setAttribute('role', 'alert');
            toast.setAttribute('aria-live', 'assertive');
            
            const icons = {
                success: 'fa-check-circle',
                error: 'fa-exclamation-circle',
                warning: 'fa-exclamation-triangle',
                info: 'fa-info-circle'
            };
            
            const titles = {
                success: 'Success',
                error: 'Error',
                warning: 'Warning',
                info: 'Information'
            };
            
            toast.innerHTML = `
                <div class="toast-icon">
                    <i class="fas ${icons[type]}" aria-hidden="true"></i>
                </div>
                <div class="toast-content">
                    <div class="toast-title">${titles[type]}</div>
                    <div class="toast-message">${Utils.sanitizeHTML(message)}</div>
                </div>
                <button class="toast-close" onclick="removeToast(this.parentElement)" aria-label="Close notification">
                    <i class="fas fa-times" aria-hidden="true"></i>
                </button>
            `;
            
            container.appendChild(toast);
            
            // Auto remove
            setTimeout(() => {
                removeToast(toast);
            }, duration);

            // Limit number of toasts
            const toasts = container.querySelectorAll('.toast');
            if (toasts.length > 5) {
                removeToast(toasts[0]);
            }
        }

        function removeToast(toast) {
            if (toast && toast.parentElement) {
                toast.classList.add('removing');
                setTimeout(() => {
                    if (toast.parentElement) {
                        toast.remove();
                    }
                }, 300);
            }
        }

        // Event Listeners and Initialization
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                console.log('Initializing admin dashboard...');

                // Set up form handlers
                const settingsForm = document.getElementById('settingsForm');
                if (settingsForm) {
                    settingsForm.addEventListener('submit', saveSettings);
                }

                // Set up keyboard navigation
                document.addEventListener('keydown', function(e) {
                    // Close modals with Escape
                    if (e.key === 'Escape') {
                        document.querySelectorAll('.modal-overlay.active').forEach(modal => {
                            closeModal(modal.id);
                        });
                    }
                    
                    // Tab navigation shortcuts (Alt + number)
                    if (e.altKey && e.key >= '1' && e.key <= '5') {
                        e.preventDefault();
                        const tabs = ['overview', 'withdrawals', 'verification', 'analytics', 'settings'];
                        const tabIndex = parseInt(e.key) - 1;
                        if (tabs[tabIndex]) {
                            const tab = document.querySelector(`[data-tab="${tabs[tabIndex]}"]`);
                            if (tab) {
                                switchTab({ currentTarget: tab, preventDefault: () => {} }, tabs[tabIndex]);
                            }
                        }
                    }
                });

                // Set up click outside modal to close
                document.addEventListener('click', function(e) {
                    if (e.target.classList.contains('modal-overlay')) {
                        closeModal(e.target.id);
                    }
                });

                // Load initial data
                await loadTabData('overview');

                // Set up auto-refresh
                setInterval(async () => {
                    if (document.visibilityState === 'visible' && appState.currentTab === 'overview') {
                        try {
                            await loadStatistics();
                        } catch (error) {
                            console.debug('Auto-refresh failed:', error);
                        }
                    }
                }, CONFIG.REFRESH_INTERVAL);

                showNotification('Admin dashboard loaded successfully', 'success');
                console.log('Dashboard initialized successfully');

            } catch (error) {
                console.error('Failed to initialize dashboard:', error);
                showNotification('Failed to initialize dashboard. Please refresh the page.', 'error');
            }
        });

        // Handle page visibility changes for performance
        document.addEventListener('visibilitychange', function() {
            if (document.visibilityState === 'visible') {
                // Refresh current tab data when page becomes visible
                if (appState.currentTab) {
                    loadTabData(appState.currentTab);
                }
            }
        });

        // Global error handler
        window.addEventListener('error', function(event) {
            console.error('Global error:', event.error);
            showNotification('An unexpected error occurred', 'error');
        });

        // Unhandled promise rejection handler
        window.addEventListener('unhandledrejection', function(event) {
            console.error('Unhandled promise rejection:', event.reason);
            showNotification('An unexpected error occurred', 'error');
        });

        // Enhanced Navigation Functions
        
        // FAB Menu Toggle
        function toggleFabMenu() {
            const fab = document.getElementById('enhanced-fab');
            if (fab) {
                fab.classList.toggle('active');
            }
        }

        // Quick Actions Handler
        function quickAction(action) {
            switch (action) {
                case 'refresh':
                    refreshAllData();
                    break;
                case 'export':
                    exportAllData();
                    break;
                case 'notifications':
                    showNotification('Notifications panel opened', 'info');
                    break;
                case 'settings':
                    // Switch to settings tab
                    const settingsTab = document.querySelector('[data-tab="settings"]');
                    if (settingsTab) {
                        switchTab({ currentTarget: settingsTab, preventDefault: () => {} }, 'settings');
                    }
                    break;
            }
            // Close FAB menu after action
            toggleFabMenu();
        }

        // Refresh all data
        function refreshAllData() {
            showNotification('Refreshing all data...', 'info');
            loadTabData(appState.currentTab || 'overview');
        }

        // Export all data
        function exportAllData() {
            showNotification('Preparing export...', 'info');
            // Implementation would export current tab data
            setTimeout(() => {
                showNotification('Export completed successfully', 'success');
            }, 2000);
        }

        function updateSectionIndicator(section) {
            const currentSection = document.getElementById('current-section');
            if (currentSection) {
                currentSection.textContent = section;
            }
        }

        function setupBackToTop() {
            const backToTop = document.getElementById('back-to-top');
            if (backToTop) {
                window.addEventListener('scroll', () => {
                    if (window.pageYOffset > 300) {
                        backToTop.classList.add('visible');
                    } else {
                        backToTop.classList.remove('visible');
                    }
                });

                backToTop.addEventListener('click', () => {
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                    // Reset to first tab
                    const firstTab = document.querySelector('[data-tab="overview"]');
                    if (firstTab) {
                        switchTab({ currentTarget: firstTab, preventDefault: () => {} }, 'overview');
                    }
                });
            }
        }

        // Initialize enhanced navigation
        document.addEventListener('DOMContentLoaded', function() {
            setupBackToTop();
            updateSectionIndicator('Overview');
        });
    </script>

    <!-- Enhanced Floating Action Button -->
    <div class="enhanced-fab" id="enhanced-fab">
        <div class="fab-tooltip">Quick Actions</div>
        <button class="fab-button" onclick="toggleFabMenu()" aria-label="Quick actions menu">
            <i class="fas fa-plus"></i>
        </button>
        <div class="fab-menu" id="fab-menu">
            <button class="fab-item" onclick="quickAction('refresh')" title="Refresh all data">
                <i class="fas fa-sync"></i>
            </button>
            <button class="fab-item" onclick="quickAction('export')" title="Export data">
                <i class="fas fa-download"></i>
            </button>
            <button class="fab-item" onclick="quickAction('notifications')" title="View notifications">
                <i class="fas fa-bell"></i>
            </button>
            <button class="fab-item" onclick="quickAction('settings')" title="Quick settings">
                <i class="fas fa-cog"></i>
            </button>
        </div>
    </div>

    <!-- Back to Top Button -->
    <button class="back-to-top" id="back-to-top" aria-label="Back to top">
        <i class="fas fa-arrow-up"></i>
    </button>
</body>
